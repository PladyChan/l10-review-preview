name: Deploy Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-1.outputs.page_url || steps.deploy-2.outputs.page_url || steps.deploy-3.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/source
          cp index.html editor.html README.md _site/
          cp -R tools _site/
          cp source/L10_测评对比草稿.md _site/source/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deploy-1
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retry
        if: ${{ steps.deploy-1.outcome == 'failure' }}
        run: sleep 20

      - name: Deploy to GitHub Pages retry 2
        id: deploy-2
        if: ${{ steps.deploy-1.outcome == 'failure' }}
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before final retry
        if: ${{ steps.deploy-1.outcome == 'failure' && steps.deploy-2.outcome == 'failure' }}
        run: sleep 40

      - name: Deploy to GitHub Pages retry 3
        id: deploy-3
        if: ${{ steps.deploy-1.outcome == 'failure' && steps.deploy-2.outcome == 'failure' }}
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Check deployment result
        if: ${{ steps.deploy-1.outcome == 'failure' && steps.deploy-2.outcome == 'failure' && steps.deploy-3.outcome == 'failure' }}
        run: exit 1
