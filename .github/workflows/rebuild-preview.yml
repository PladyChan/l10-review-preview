name: Rebuild preview

on:
  push:
    branches:
      - main
    paths:
      - "source/**.md"
      - "build_l10_html_preview.py"
      - ".github/workflows/rebuild-preview.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Rebuild static preview
        run: python3 build_l10_html_preview.py

      - name: Commit regenerated page
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Rebuild preview from markdown"
          git pull --rebase origin main
          git push

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/source
          cp index.html editor.html README.md _site/
          cp source/L10_测评对比草稿.md _site/source/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
