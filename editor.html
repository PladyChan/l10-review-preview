<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>L10 Markdown Editor</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #050505;
      --panel: #0d0d0d;
      --panel-2: #171717;
      --ink: #f1f1f1;
      --body: #c9c9c9;
      --muted: #8a8a8a;
      --line: #2b2b2b;
      --accent: #ff2a2a;
      --ok: #d7d7d7;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f3f1ea;
        --panel: #fffdf6;
        --panel-2: #ebe7dc;
        --ink: #111;
        --body: #36322c;
        --muted: #706b62;
        --line: #cbc4b5;
        --accent: #d71920;
        --ok: #111;
      }
    }
    * { box-sizing: border-box; }
    html {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      overscroll-behavior-x: none;
      touch-action: pan-y;
    }
    body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      height: 100vh;
      height: var(--app-height, 100dvh);
      min-height: 100vh;
      min-height: var(--app-height, 100dvh);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      overscroll-behavior-x: none;
      touch-action: pan-y;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
    }
    button, input, .editor-surface { font: inherit; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      flex: 0 0 auto;
      width: 100%;
      max-width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(14px);
    }
    .mobile-switch {
      display: none;
      width: 100%;
      max-width: 100%;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    .mobile-switch button {
      min-height: 38px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
    }
    .mobile-switch button:first-child {
      border-radius: 6px 0 0 6px;
      border-right: 0;
    }
    .mobile-switch button:last-child { border-radius: 0 6px 6px 0; }
    .mobile-switch button.is-active {
      background: var(--ink);
      color: var(--bg);
    }
    .brand {
      min-width: 0;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.3;
      text-transform: uppercase;
    }
    .brand strong {
      display: block;
      overflow: hidden;
      color: var(--ink);
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .brand span { color: var(--muted); }
    .status-action {
      margin-left: 8px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--accent);
      font: inherit;
      text-decoration: underline;
      cursor: pointer;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(7, minmax(42px, 1fr));
      justify-content: stretch;
      gap: 6px;
    }
    .button {
      display: inline-flex;
      min-width: 0;
      min-height: 34px;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      font-size: 17px;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
    }
    .button-label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }
    .button-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.2em;
      height: 1.2em;
    }
    .button:hover { border-color: var(--accent); }
    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .workspace {
      display: grid;
      flex: 1 1 auto;
      width: 100%;
      max-width: 100%;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      min-height: 0;
      overflow: hidden;
    }
    .pane {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
      min-height: 0;
      max-width: 100%;
      overflow: hidden;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }
    .pane:last-child { border-right: 0; }
    .pane-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 46px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }
    .pane-head h1,
    .pane-head h2 {
      margin: 0;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-transform: uppercase;
    }
    .stats {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      white-space: nowrap;
    }
    .editor-surface {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      resize: none;
      padding: 22px;
      border: 0;
      border-radius: 0;
      outline: 0;
      appearance: none;
      background: var(--panel);
      color: var(--body);
      font-family: var(--mono);
      font-size: 17px;
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      -webkit-overflow-scrolling: touch;
      caret-color: var(--accent);
      user-select: text;
    }
    .preview {
      width: 100%;
      height: 100%;
      max-width: 100%;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 22px;
      color: var(--body);
      line-height: 1.78;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .preview h1,
    .preview h2,
    .preview h3,
    .preview h4 {
      color: var(--ink);
      line-height: 1.35;
    }
    .preview h1 { font-size: 28px; }
    .preview h2 {
      margin-top: 34px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 22px;
    }
    .preview h3 { margin-top: 26px; font-size: 18px; }
    .preview p {
      margin: 0 0 14px;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .preview blockquote {
      margin: 16px 0;
      padding: 10px 14px;
      border-left: 3px solid var(--accent);
      background: var(--panel-2);
    }
    .preview code {
      padding: 1px 5px;
      border: 1px solid var(--line);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.92em;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .preview table {
      width: 100%;
      max-width: 100%;
      margin: 18px 0;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 14px;
    }
    .preview th,
    .preview td {
      padding: 8px;
      border: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .preview th {
      color: var(--ink);
      background: var(--panel-2);
    }
    .drawer {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      width: min(520px, calc(100vw - 32px));
      max-height: min(620px, calc(100vh - 32px));
      max-height: min(620px, calc(var(--app-height, 100dvh) - 32px));
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.35);
    }
    .drawer[hidden] { display: none; }
    .drawer header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }
    .drawer h2 {
      margin: 0;
      font-family: var(--mono);
      font-size: 12px;
      text-transform: uppercase;
    }
    .form {
      display: grid;
      gap: 10px;
      padding: 12px;
    }
    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--body);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.4;
      text-transform: none;
    }
    .check-row input {
      width: 16px;
      min-height: 16px;
      accent-color: var(--accent);
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg);
      color: var(--ink);
    }
    .status {
      min-height: 20px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.5;
    }
    .status strong { color: var(--ok); }
    .danger { color: var(--accent); }
    @media (max-width: 900px) {
      html,
      body {
        height: var(--app-height, 100dvh);
        overflow: hidden;
      }
      body {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        position: sticky;
        flex: 0 0 auto;
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 8px;
      }
      .brand {
        font-size: 11px;
        line-height: 1.2;
      }
      .actions {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        justify-content: stretch;
        gap: 6px;
      }
      .button {
        min-height: 34px;
      }
      .mobile-switch {
        position: sticky;
        top: 0;
        z-index: 9;
        display: grid;
        flex: 0 0 auto;
      }
      .workspace {
        flex: 1 1 auto;
        grid-template-columns: 1fr;
        min-height: 0;
        overflow: hidden;
      }
      .pane {
        min-height: 0;
        border-right: 0;
        border-bottom: 0;
      }
      .preview-pane {
        display: flex;
        flex-direction: column;
      }
      .pane-head { min-height: 40px; }
      .editor-surface {
        height: var(--editor-height, calc(var(--app-height, 100dvh) - 185px));
        min-height: var(--editor-height, calc(var(--app-height, 100dvh) - 185px));
        padding: 18px;
        font-size: 18px;
        line-height: 1.8;
      }
      .preview {
        flex: 1 1 auto;
        height: auto;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        padding: 18px;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
      }
      body[data-mobile-view="edit"] .pane.preview-pane,
      body[data-mobile-view="preview"] .pane.editor-pane {
        display: none;
      }
      .drawer {
        right: 0;
        bottom: 0;
        width: 100vw;
        max-height: 82vh;
        border-right: 0;
        border-bottom: 0;
        border-left: 0;
        border-radius: 8px 8px 0 0;
      }
    }
  </style>
</head>
<body data-mobile-view="edit">
  <header class="topbar">
    <div class="brand">
      <strong>L10_测评对比草稿.md</strong>
      <span data-status>正在载入 source/L10_测评对比草稿.md</span>
    </div>
    <div class="actions">
      <a class="button" href="index.html" title="回到阅读版" aria-label="回到阅读版"><span class="button-icon" aria-hidden="true">←</span><span class="button-label">阅读版</span></a>
      <a class="button" href="https://github.com/PladyChan/l10-review-preview/edit/main/source/L10_%E6%B5%8B%E8%AF%84%E5%AF%B9%E6%AF%94%E8%8D%89%E7%A8%BF.md" title="打开 GitHub 网页编辑" aria-label="打开 GitHub 网页编辑"><span class="button-icon" aria-hidden="true">⌘</span><span class="button-label">GitHub</span></a>
      <button class="button" type="button" data-undo title="撤销" aria-label="撤销"><span class="button-icon" aria-hidden="true">↶</span><span class="button-label">撤销</span></button>
      <button class="button" type="button" data-redo title="重做" aria-label="重做"><span class="button-icon" aria-hidden="true">↷</span><span class="button-label">重做</span></button>
      <button class="button" type="button" data-copy title="复制" aria-label="复制"><span class="button-icon" aria-hidden="true">⧉</span><span class="button-label">复制</span></button>
      <button class="button" type="button" data-download title="下载" aria-label="下载"><span class="button-icon" aria-hidden="true">↓</span><span class="button-label">下载</span></button>
      <button class="button primary" type="button" data-open-github title="提交" aria-label="提交"><span class="button-icon" aria-hidden="true">↑</span><span class="button-label">提交</span></button>
    </div>
  </header>

  <div class="mobile-switch" aria-label="切换编辑和预览">
    <button class="is-active" type="button" data-view="edit">编辑</button>
    <button type="button" data-view="preview">预览</button>
  </div>

  <main class="workspace">
    <section class="pane editor-pane">
      <div class="pane-head">
        <h1>Markdown</h1>
        <div class="stats" data-stats>-</div>
      </div>
      <textarea class="editor-surface" data-editor aria-label="Markdown 编辑器" spellcheck="false" autocorrect="off" autocapitalize="off" wrap="soft"></textarea>
    </section>
    <section class="pane preview-pane">
      <div class="pane-head">
        <h2>Preview</h2>
        <div class="stats" data-saved>未保存</div>
      </div>
      <article class="preview" data-preview></article>
    </section>
  </main>

  <aside class="drawer" data-drawer hidden>
    <header>
      <h2>Commit to GitHub</h2>
      <button class="button" type="button" data-close>关闭</button>
    </header>
    <div class="form">
      <label>Owner<input data-owner value="PladyChan" autocomplete="off"></label>
      <label>Repo<input data-repo value="l10-review-preview" autocomplete="off"></label>
      <label>Branch<input data-branch value="main" autocomplete="off"></label>
      <label>Path<input data-path value="source/L10_测评对比草稿.md" autocomplete="off"></label>
      <label>Commit message<input data-message value="Update L10 markdown draft" autocomplete="off"></label>
      <label>GitHub token<input data-token type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="粘贴 github_pat_... token"></label>
      <label class="check-row"><input data-remember-token type="checkbox">在这台设备记住 token</label>
      <button class="button primary" type="button" data-commit>提交当前 Markdown</button>
      <div class="status" data-github-status>Token 只在本页本次会话使用。</div>
    </div>
  </aside>

  <script>
    const SOURCE_PATH = "source/L10_测评对比草稿.md";
    const FILE_NAME = "L10_测评对比草稿.md";
    const DRAFT_KEY = "l10-md-editor-draft";
    const TOKEN_KEY = "l10-md-editor-github-token";
    const editor = document.querySelector("[data-editor]");
    const preview = document.querySelector("[data-preview]");
    const statusEl = document.querySelector("[data-status]");
    const statsEl = document.querySelector("[data-stats]");
    const savedEl = document.querySelector("[data-saved]");
    const drawer = document.querySelector("[data-drawer]");
    const tokenInput = document.querySelector("[data-token]");
    const rememberToken = document.querySelector("[data-remember-token]");
    let lastSaved = "";
    let viewportTimer = 0;
    let pendingDraft = "";

    const getEditorValue = () => editor.value;
    const setEditorValue = (value) => {
      editor.value = value;
    };

    const escapeHtml = (value) => value
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");

    const inline = (value) => escapeHtml(value)
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

    const tableHtml = (rows) => {
      const parsed = rows.map((row) => row.trim().replace(/^\||\|$/g, "").split("|").map((cell) => cell.trim()));
      if (parsed.length < 2) return "";
      const isDivider = parsed[1].every((cell) => /^:?-{3,}:?$/.test(cell));
      const bodyRows = isDivider ? parsed.slice(2) : parsed.slice(1);
      const head = parsed[0].map((cell) => `<th>${inline(cell)}</th>`).join("");
      const body = bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${inline(cell)}</td>`).join("")}</tr>`).join("");
      return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    };

    const markdownToHtml = (markdown) => {
      const lines = markdown.split(/\r?\n/);
      const out = [];
      let inUl = false;
      let inOl = false;
      const closeLists = () => {
        if (inUl) out.push("</ul>");
        if (inOl) out.push("</ol>");
        inUl = false;
        inOl = false;
      };

      for (let index = 0; index < lines.length; index += 1) {
        const line = lines[index].trim();
        if (!line) {
          closeLists();
          continue;
        }
        if (line.startsWith("|")) {
          closeLists();
          const rows = [];
          while (index < lines.length && lines[index].trim().startsWith("|")) {
            rows.push(lines[index]);
            index += 1;
          }
          index -= 1;
          out.push(tableHtml(rows));
          continue;
        }
        const heading = line.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          closeLists();
          out.push(`<h${heading[1].length}>${inline(heading[2])}</h${heading[1].length}>`);
          continue;
        }
        if (line.startsWith("- ")) {
          if (!inUl) {
            closeLists();
            out.push("<ul>");
            inUl = true;
          }
          out.push(`<li>${inline(line.slice(2))}</li>`);
          continue;
        }
        if (/^\d+\.\s+/.test(line)) {
          if (!inOl) {
            closeLists();
            out.push("<ol>");
            inOl = true;
          }
          out.push(`<li>${inline(line.replace(/^\d+\.\s+/, ""))}</li>`);
          continue;
        }
        closeLists();
        if (line.startsWith(">")) out.push(`<blockquote>${inline(line.replace(/^>\s?/, ""))}</blockquote>`);
        else out.push(`<p>${inline(line)}</p>`);
      }
      closeLists();
      return out.join("\n");
    };

    const update = () => {
      const value = getEditorValue();
      preview.innerHTML = markdownToHtml(value);
      const chars = value.length;
      const lines = value ? value.split(/\r?\n/).length : 0;
      statsEl.textContent = `${chars} 字符 / ${lines} 行`;
      savedEl.textContent = value === lastSaved ? "已同步" : "浏览器草稿";
      try {
        localStorage.setItem(DRAFT_KEY, value);
      } catch (error) {}
    };

    const isMobileLayout = () => window.matchMedia("(max-width: 900px)").matches;

    const syncViewportSize = () => {
      document.documentElement.style.setProperty("--app-height", `${window.innerHeight}px`);

      if (!isMobileLayout()) {
        document.documentElement.style.removeProperty("--editor-height");
      }
    };

    const queueViewportSync = () => {
      window.clearTimeout(viewportTimer);
      syncViewportSize();
      viewportTimer = window.setTimeout(syncViewportSize, 120);
    };

    const loadSource = async () => {
      const draft = localStorage.getItem(DRAFT_KEY);
      const response = await fetch(`${SOURCE_PATH}?v=${Date.now()}`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const source = await response.text();
      lastSaved = source;
      pendingDraft = draft && draft !== source ? draft : "";
      setEditorValue(source);
      if (pendingDraft) {
        statusEl.innerHTML = '已载入线上 Markdown，发现本机草稿 <button class="status-action" type="button" data-restore-draft>恢复草稿</button>';
      } else {
        statusEl.textContent = "已载入线上 Markdown";
      }
      update();
    };

    const download = () => {
      const blob = new Blob([getEditorValue()], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = FILE_NAME;
      link.click();
      URL.revokeObjectURL(url);
    };

    const copyText = async () => {
      await navigator.clipboard.writeText(getEditorValue());
      statusEl.textContent = "Markdown 已复制";
    };

    const runEditCommand = (command, label) => {
      editor.focus();
      const didRun = document.execCommand(command);
      update();
      statusEl.textContent = didRun ? `${label}完成` : `${label}不可用`;
    };

    const base64Encode = (text) => btoa(unescape(encodeURIComponent(text)));

    const loadRememberedToken = () => {
      try {
        const savedToken = localStorage.getItem(TOKEN_KEY);
        if (savedToken) {
          tokenInput.value = savedToken;
          rememberToken.checked = true;
          document.querySelector("[data-github-status]").textContent = "已从这台设备载入保存的 token。";
        }
      } catch (error) {}
    };

    const syncRememberedToken = () => {
      try {
        if (rememberToken.checked && tokenInput.value.trim()) {
          localStorage.setItem(TOKEN_KEY, tokenInput.value.trim());
        } else if (!rememberToken.checked) {
          localStorage.removeItem(TOKEN_KEY);
        }
      } catch (error) {}
    };

    const commitToGithub = async () => {
      const owner = document.querySelector("[data-owner]").value.trim();
      const repo = document.querySelector("[data-repo]").value.trim();
      const branch = document.querySelector("[data-branch]").value.trim();
      const path = document.querySelector("[data-path]").value.trim();
      const message = document.querySelector("[data-message]").value.trim();
      const token = tokenInput.value.trim();
      const githubStatus = document.querySelector("[data-github-status]");
      const missing = [
        [owner, "Owner"],
        [repo, "Repo"],
        [branch, "Branch"],
        [path, "Path"],
        [message, "Commit message"],
        [token, "GitHub token"]
      ].filter(([value]) => !value).map(([, label]) => label);
      if (missing.length) {
        githubStatus.innerHTML = `<span class='danger'>还没填：${missing.join("、")}。GitHub token 不是 GitHub 密码，要粘贴 github_pat_... 这类授权字符串。</span>`;
        return;
      }
      const apiPath = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path).replace(/%2F/g, "/")}`;
      githubStatus.textContent = "读取当前文件 SHA...";
      const getResponse = await fetch(`${apiPath}?ref=${encodeURIComponent(branch)}`, {
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${token}`,
          "X-GitHub-Api-Version": "2022-11-28"
        }
      });
      const current = getResponse.ok ? await getResponse.json() : null;
      githubStatus.textContent = "提交中...";
      const putResponse = await fetch(apiPath, {
        method: "PUT",
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${token}`,
          "Content-Type": "application/json",
          "X-GitHub-Api-Version": "2022-11-28"
        },
        body: JSON.stringify({
          message,
          content: base64Encode(getEditorValue()),
          branch,
          sha: current && current.sha ? current.sha : undefined
        })
      });
      const result = await putResponse.json();
      if (!putResponse.ok) {
        if (putResponse.status === 403 && /Resource not accessible/i.test(result.message || "")) {
          throw new Error("这个 token 没有写入仓库文件的权限。请重新生成 token：Repository access 选 l10-review-preview，Repository permissions 里的 Contents 设为 Read and write。");
        }
        throw new Error(result.message || `HTTP ${putResponse.status}`);
      }
      lastSaved = getEditorValue();
      localStorage.removeItem(DRAFT_KEY);
      syncRememberedToken();
      update();
      githubStatus.innerHTML = `<strong>已提交：</strong><a href="${result.content.html_url}" target="_blank" rel="noreferrer">打开文件</a>`;
      statusEl.textContent = "已提交到 GitHub";
    };

    editor.addEventListener("input", update);
    editor.addEventListener("paste", (event) => {
      event.preventDefault();
      const text = event.clipboardData ? event.clipboardData.getData("text/plain") : "";
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.setRangeText(text, start, end, "end");
      update();
    });
    editor.addEventListener("focus", queueViewportSync);
    editor.addEventListener("blur", queueViewportSync);
    window.addEventListener("resize", queueViewportSync);
    window.addEventListener("orientationchange", queueViewportSync);
    ["gesturestart", "gesturechange", "gestureend"].forEach((eventName) => {
      document.addEventListener(eventName, (event) => event.preventDefault(), { passive: false });
    });
    document.querySelector("[data-undo]").addEventListener("click", () => runEditCommand("undo", "撤销"));
    document.querySelector("[data-redo]").addEventListener("click", () => runEditCommand("redo", "重做"));
    document.querySelector("[data-download]").addEventListener("click", download);
    document.querySelector("[data-copy]").addEventListener("click", () => copyText().catch((error) => {
      statusEl.textContent = error.message;
    }));
    statusEl.addEventListener("click", (event) => {
      if (!event.target.matches("[data-restore-draft]")) return;
      if (!pendingDraft) return;
      setEditorValue(pendingDraft);
      pendingDraft = "";
      update();
      statusEl.textContent = "已恢复本机草稿";
    });
    document.querySelector("[data-open-github]").addEventListener("click", () => {
      loadRememberedToken();
      drawer.hidden = false;
    });
    document.querySelector("[data-close]").addEventListener("click", () => {
      drawer.hidden = true;
    });
    document.querySelector("[data-commit]").addEventListener("click", () => {
      commitToGithub().catch((error) => {
        document.querySelector("[data-github-status]").innerHTML = `<span class="danger">${escapeHtml(error.message)}</span>`;
      });
    });
    tokenInput.addEventListener("input", () => {
      if (rememberToken.checked) syncRememberedToken();
    });
    rememberToken.addEventListener("change", syncRememberedToken);
    const setMobileView = (view) => {
      if (view === "preview") {
        editor.blur();
        document.documentElement.style.removeProperty("--editor-height");
      }
      document.body.dataset.mobileView = view;
      document.querySelectorAll("[data-view]").forEach((item) => {
        item.classList.toggle("is-active", item.dataset.view === view);
      });
      window.setTimeout(() => {
        queueViewportSync();
        if (view === "preview") preview.scrollTo(0, 0);
      }, view === "preview" ? 160 : 0);
    };

    document.querySelectorAll("[data-view]").forEach((button) => {
      button.addEventListener("click", () => setMobileView(button.dataset.view));
    });

    queueViewportSync();
    loadRememberedToken();
    loadSource().catch((error) => {
      statusEl.textContent = `载入失败：${error.message}`;
      setEditorValue(localStorage.getItem(DRAFT_KEY) || "");
      update();
    });
  </script>
</body>
</html>
