<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>F5.6 白天锐度对比</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark light;
      --bg: #090909;
      --panel: #141414;
      --panel-2: #202020;
      --ink: #f2f2f2;
      --body: #cfcfcf;
      --muted: #8b8b8b;
      --line: #343434;
      --accent: #e3322b;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
      --doto: "Doto", "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      min-height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button,
    select {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--panel-2);
      color: var(--ink);
    }

    button {
      cursor: pointer;
    }

    button:hover,
    select:hover {
      border-color: var(--accent);
    }

    button.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .toolbar,
    .view-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .toolbar {
      position: relative;
      z-index: 20;
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .toolbar label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-family: var(--doto);
      font-weight: 700;
      font-size: 11px;
      line-height: 1.2;
    }

    .toolbar button {
      min-height: 30px;
      padding: 4px 9px;
      font-family: var(--doto);
      font-weight: 700;
      font-size: 12px;
    }

    .toolbar select {
      min-width: min(30vw, 280px);
      max-width: min(34vw, 340px);
      min-height: 30px;
      padding: 3px 28px 3px 8px;
      font-size: 12px;
    }

    .toolbar input[type="range"] {
      width: min(24vw, 180px);
      accent-color: var(--accent);
    }

    .segmented {
      display: flex;
      gap: 4px;
      min-width: 0;
      max-width: min(46vw, 520px);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .segmented::-webkit-scrollbar {
      display: none;
    }

    .segmented button {
      white-space: nowrap;
    }

    .group-options {
      max-width: min(52vw, 620px);
    }

    .main {
      display: block;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: 8px;
      padding: 8px;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .compare-grid.is-single {
      grid-template-columns: minmax(0, 1fr);
    }

    .camera-card {
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      min-height: 0;
      height: 100%;
    }

    .stage {
      position: relative;
      min-height: 0;
      height: 100%;
      overflow: hidden;
      background:
        linear-gradient(45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(-45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%),
        linear-gradient(-45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      touch-action: none;
      cursor: grab;
    }

    .stage:active {
      cursor: grabbing;
    }

    .stage img[data-camera] {
      position: absolute;
      left: 0;
      top: 0;
      max-width: none;
      width: auto;
      height: auto;
      transform: none;
      user-select: none;
      pointer-events: none;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    .image-label {
      position: absolute;
      left: 7px;
      top: 7px;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      max-width: calc(100% - 16px);
      padding: 4px 6px;
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
      background: color-mix(in srgb, var(--panel) 86%, transparent);
      color: var(--ink);
      font-size: 11px;
      line-height: 1.2;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .image-label span {
      color: var(--muted);
      font-family: var(--doto);
      font-weight: 700;
      font-size: 10px;
      white-space: nowrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      padding: 0 5px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 10px;
      font-family: var(--doto);
      font-weight: 800;
    }

    .tag[data-kind="optical"],
    .tag[data-kind="native"] {
      color: var(--ink);
    }

    .minimap {
      position: absolute;
      right: 52px;
      bottom: 10px;
      z-index: 6;
      width: 132px;
      border: 1px solid color-mix(in srgb, var(--line) 88%, transparent);
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      box-shadow: 0 8px 22px color-mix(in srgb, #000 36%, transparent);
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .minimap-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: #050505;
    }

    .minimap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.62;
    }

    .minimap-viewport {
      position: absolute;
      border: 2px solid var(--accent);
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      box-shadow: 0 0 0 999px color-mix(in srgb, #000 22%, transparent);
    }

    .minimap-meta {
      position: absolute;
      right: 5px;
      bottom: 5px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      padding: 4px 6px;
      border: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
      background: color-mix(in srgb, #000 72%, transparent);
      color: var(--body);
      font-family: var(--doto);
      font-weight: 700;
      font-size: 10px;
      line-height: 1.1;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .empty-state strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 16px;
    }

    .empty-state span {
      color: var(--muted);
      font-family: var(--doto);
      font-weight: 700;
      font-size: 12px;
    }

    .loading-state {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 8;
      display: grid;
      place-items: center;
      color: var(--ink);
      pointer-events: none;
    }

    .loading-pill {
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
    }

    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid color-mix(in srgb, var(--muted) 38%, transparent);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .stage.is-loaded .loading-state {
      display: none;
    }

    .debug-control {
      display: none;
    }

    body.is-debug .debug-control {
      display: inline-flex;
    }

    @media (max-width: 980px) {
      body {
        overflow: hidden;
      }

      .app {
        height: 100vh;
        overflow: hidden;
      }

      .toolbar select {
        min-width: min(44vw, 300px);
        max-width: 100%;
      }
    }

    @media (max-width: 720px) {
      body {
        overflow: hidden;
      }

      .app {
        height: 100dvh;
        min-height: 100dvh;
        overflow: hidden;
      }

      .toolbar {
        align-items: end;
        gap: 6px;
        padding: 6px;
      }

      .toolbar label {
        font-size: 10px;
      }

      .toolbar button {
        min-height: 28px;
        padding: 3px 7px;
        font-size: 11px;
      }

      .toolbar input[type="range"] {
        width: min(34vw, 150px);
      }

      .toolbar select {
        width: min(42vw, 220px);
        min-width: 0;
        font-size: 11px;
      }

      .segmented {
        max-width: 100%;
      }

      .group-options {
        max-width: 100%;
      }

      .view-controls {
        gap: 5px;
        flex: 1 1 100%;
      }

      .view-controls button {
        flex: 1 1 auto;
      }

      .compare-grid {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(2, minmax(0, 1fr));
        gap: 4px;
        padding: 4px;
        height: 100%;
      }

      .compare-grid.is-single {
        grid-template-rows: minmax(0, 1fr);
      }

      .camera-card {
        min-height: 0;
        height: 100%;
      }

      .minimap {
        right: 42px;
        bottom: 8px;
        width: min(82px, 28vw);
      }

      .image-label {
        left: 5px;
        top: 5px;
        max-width: calc(100% - 10px);
        gap: 5px;
        padding: 3px 5px;
        font-size: 10px;
      }

      .image-label span,
      .minimap-meta {
        font-size: 9px;
      }
    }
  </style>
  <link rel="stylesheet" href="tool-ui.css">
</head>
<body>
  <div class="app">
    <div class="toolbar" aria-label="锐度对比控制">
      <label>机型
        <div class="segmented group-options" data-group-options></div>
      </label>
      <label>焦段
        <div class="segmented" data-focal-options></div>
      </label>
      <label>缩放
        <input type="range" min="0.05" max="4" step="0.01" value="1" data-zoom>
      </label>
      <div class="view-controls">
        <button type="button" data-fit>适合窗口</button>
        <button type="button" data-max-view>最大显示</button>
        <button type="button" data-actual>100%</button>
        <button type="button" data-center>回到中心</button>
        <button type="button" data-corner>定位边角</button>
        <button class="debug-control" type="button" data-mark-anchor>标记中心</button>
        <button class="debug-control" type="button" data-mark-corner>标记边角</button>
        <button class="debug-control" type="button" data-copy-anchors>复制标记</button>
        <button class="debug-control" type="button" data-reset-anchors>清除标记</button>
        <button type="button" data-view>单图</button>
        <button type="button" data-fullscreen>全屏</button>
      </div>
    </div>

    <div class="main">
      <section class="compare-grid" data-grid></section>
    </div>
  </div>

  <script src="tool-ui.js"></script>
  <script>
    (() => {
      const state = {
        config: null,
        focal: "50",
        zoom: 1,
        panX: 0,
        panY: 0,
        view: "compare",
        group: null,
        markMode: null,
        focusMode: "center",
        anchorOverrides: {},
        cornerOverrides: {}
      };

      let assetBase = "day-sharpness-assets";
      let scaleBaseCamera = "l10";
      const storageKey = "l10-day-sharpness-view-v2";
      let controlsRendered = false;
      const grid = document.querySelector("[data-grid]");
      const focalOptions = document.querySelector("[data-focal-options]");
      const groupOptions = document.querySelector("[data-group-options]");
      const zoomInput = document.querySelector("[data-zoom]");
      const maxViewButton = document.querySelector("[data-max-view]");
      const viewButton = document.querySelector("[data-view]");
      const fullscreenButton = document.querySelector("[data-fullscreen]");
      const markButton = document.querySelector("[data-mark-anchor]");
      const markCornerButton = document.querySelector("[data-mark-corner]");
      const copyAnchorsButton = document.querySelector("[data-copy-anchors]");
      const isEmbedded = window.self !== window.top;
      const params = new URLSearchParams(window.location.search);
      const isFullPageTool = !isEmbedded;
      document.body.classList.toggle("is-debug", params.has("debug"));

      const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));

      const formatZoom = (value = state.zoom) => `${Math.round(value * 100)}%`;
      const labelFor = (item) => `${item.camera} · ${item.label} · ${item.aperture} · ${item.iso}`;
      const availableForFocal = () => state.config.items.filter((item) => item.focal === state.focal);

      async function loadConfig() {
        const response = await fetch("day-sharpness-config.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`Config request failed: ${response.status}`);
        state.config = await response.json();
        assetBase = state.config.assetBase || assetBase;
        scaleBaseCamera = state.config.scaleBaseCamera || scaleBaseCamera;
        state.focal = state.config.defaultFocal || state.config.focals[0];
      }

      function save() {
        try {
          localStorage.setItem(storageKey, JSON.stringify({
            focal: state.focal,
            zoom: state.zoom,
            panX: state.panX,
            panY: state.panY,
            view: state.view,
            group: state.group,
            focusMode: state.focusMode,
            anchorOverrides: state.anchorOverrides,
            cornerOverrides: state.cornerOverrides
          }));
        } catch (error) {
          console.warn("Local save failed", error);
        }
      }

      function hydrate() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (!saved) return;
          if (state.config.focals.includes(saved.focal)) state.focal = saved.focal;
          state.zoom = Number(saved.zoom || state.zoom);
          state.panX = Number(saved.panX || 0);
          state.panY = Number(saved.panY || 0);
          state.view = saved.view === "single" ? "single" : "compare";
          if (groupFor(saved.group)) state.group = saved.group;
          state.focusMode = saved.focusMode === "corner" ? "corner" : "center";
          if (saved.anchorOverrides && typeof saved.anchorOverrides === "object") {
            state.anchorOverrides = saved.anchorOverrides;
          }
          if (saved.cornerOverrides && typeof saved.cornerOverrides === "object") {
            state.cornerOverrides = saved.cornerOverrides;
          }
        } catch (error) {
          console.warn("Local restore failed", error);
        }
      }

      function groups() {
        return Array.isArray(state.config.compareGroups) ? state.config.compareGroups : [];
      }

      function groupFor(id) {
        return groups().find((group) => group.id === id) || groups()[0] || null;
      }

      function chooseDefaults() {
        if (!groupFor(state.group)) state.group = groups()[0]?.id || null;
        const focals = availableFocalsForGroup(groupFor(state.group));
        if (focals.length && !focals.includes(state.focal)) state.focal = focals[0];
      }

      function activeItems() {
        const group = groupFor(state.group);
        if (!group) return [];
        const left = resolveGroupItem(group, "left");
        const right = resolveGroupItem(group, "right");
        return state.view === "single" ? [left] : [left, right];
      }

      function resolveGroupItem(group, side) {
        const prefix = side === "left" ? "left" : "right";
        const label = side === "left" ? "L10" : (group.rightLabel || group.label || "对照相机");
        const explicitId = group[`${prefix}ItemIds`]?.[state.focal];
        if (explicitId) {
          const explicitItem = state.config.items.find((item) => item.id === explicitId);
          if (explicitItem) return explicitItem;
        }
        const cameraId = group[`${prefix}CameraId`];
        const status = group[`${prefix}Status`];
        const item = state.config.items.find((candidate) => (
          candidate.cameraId === cameraId
          && candidate.focal === state.focal
          && (!status || candidate.status === status)
        ));
        return item || {
          missing: true,
          id: `${group.id}_${side}_${state.focal}_missing`,
          camera: label,
          cameraId: cameraId || `${side}-missing`,
          focal: state.focal,
          label: `${state.focal}mm`,
          aperture: "F5.6",
          iso: "",
          status: "无法拍摄",
          pixels: "",
          missingReason: `${label} 无法拍摄 ${state.focal}mm`
        };
      }

      function hasGroupItem(group, side, focal) {
        if (!group) return false;
        const previousFocal = state.focal;
        state.focal = focal;
        const item = resolveGroupItem(group, side);
        state.focal = previousFocal;
        return Boolean(item && !item.missing);
      }

      function availableFocalsForGroup(group) {
        if (!group) return state.config.focals;
        // Keep every focal length the protagonist can shoot visible. The
        // comparison side renders an explicit unavailable state when needed.
        return state.config.focals.filter((focal) => hasGroupItem(group, "left", focal));
      }

      function itemSrc(item) {
        return `${assetBase}/${item.file}`;
      }

      function renderFocalOptions() {
        const focals = availableFocalsForGroup(groupFor(state.group));
        focalOptions.innerHTML = focals.map((focal) => (
          `<button type="button" data-focal="${escapeHtml(focal)}">${escapeHtml(focal)}mm</button>`
        )).join("");
        updateOptionStates();
      }

      function renderGroupOptions() {
        groupOptions.innerHTML = groups().map((group) => (
          `<button type="button" data-group="${escapeHtml(group.id)}">${escapeHtml(group.label)}</button>`
        )).join("");
        updateOptionStates();
      }

      function statusKind(item) {
        return item.status === "光学" ? "optical" : item.status === "原生" ? "native" : "crop";
      }

      function renderGrid() {
        const items = activeItems();
        grid.classList.toggle("is-single", state.view === "single");
        if (!items.length) {
          grid.innerHTML = '<div class="empty-state">没有找到可用锐度素材</div>';
          return;
        }
        grid.innerHTML = items.map((item) => {
          if (item.missing) {
            return `
              <article class="camera-card" data-card="${escapeHtml(item.id)}">
                <div class="stage" data-stage>
                  <div class="empty-state">
                    <div>
                      <strong>${escapeHtml(item.missingReason)}</strong>
                      <span>F5.6 · 当前对比组缺少该焦段素材</span>
                    </div>
                  </div>
                  <div class="image-label">
                    <strong>${escapeHtml(item.camera)}</strong>
                    <span class="tag">${escapeHtml(item.status)}</span>
                    <span>${escapeHtml(state.focal)}mm · F5.6</span>
                  </div>
                </div>
              </article>
            `;
          }
          const src = itemSrc(item);
          return `
            <article class="camera-card" data-card="${escapeHtml(item.id)}">
              <div class="stage" data-stage>
                <img src="${src}" alt="${escapeHtml(labelFor(item))}" data-camera="${escapeHtml(item.cameraId)}" data-item-id="${escapeHtml(item.id)}" data-anchor-x="${item.anchor ? item.anchor[0] : ""}" data-anchor-y="${item.anchor ? item.anchor[1] : ""}" data-corner-x="${item.corner ? item.corner[0] : ""}" data-corner-y="${item.corner ? item.corner[1] : ""}" data-scale="1">
                <div class="loading-state"><div class="loading-pill"><span class="loading-spinner"></span></div></div>
                <div class="image-label">
                  <strong>${escapeHtml(item.camera)}</strong>
                  <span class="tag" data-kind="${statusKind(item)}">${escapeHtml(item.status)}</span>
                  <span>${escapeHtml(item.label)} · ${escapeHtml(item.aperture)} · ${escapeHtml(item.iso)}</span>
                  <span>${escapeHtml(item.pixels)}</span>
                  ${state.anchorOverrides[item.id] ? '<span>手动中心</span>' : ''}
                  ${state.cornerOverrides[item.id] ? '<span>手动边角</span>' : ''}
                </div>
                <div class="minimap">
                  <div class="minimap-frame" data-minimap-frame>
                    <img src="${src}" alt="">
                    <div class="minimap-viewport" data-minimap-viewport></div>
                    <div class="minimap-meta" data-minimap-meta>${formatZoom()}</div>
                  </div>
                </div>
              </div>
            </article>
          `;
        }).join("");
      }

      function setZoom(value) {
        state.zoom = Math.min(4, Math.max(0.05, Math.round(value * 100) / 100));
        zoomInput.value = String(state.zoom);
      }

      function activeAnchorForImage(img) {
        const itemId = img.dataset.itemId;
        const corner = state.cornerOverrides[itemId];
        if (state.focusMode === "corner" && Array.isArray(corner) && corner.length === 2) {
          return [Number(corner[0]), Number(corner[1])];
        }
        if (state.focusMode === "corner") {
          const configCorner = [Number(img.dataset.cornerX), Number(img.dataset.cornerY)];
          if (configCorner.every(Number.isFinite) && configCorner.every((value) => value > 0)) {
            return configCorner;
          }
        }
        const center = state.anchorOverrides[itemId];
        if (Array.isArray(center) && center.length === 2) {
          return [Number(center[0]), Number(center[1])];
        }
        return [
          Number(img.dataset.anchorX) || img.naturalWidth / 2,
          Number(img.dataset.anchorY) || img.naturalHeight / 2
        ];
      }

      function effectiveZoomForImage(img) {
        return state.zoom * (Number(img.dataset.scale) || 1);
      }

      function normalizeImageScales() {
        const images = Array.from(document.querySelectorAll("[data-stage] img[data-camera]"));
        const base = images.find((img) => img.dataset.camera === scaleBaseCamera && img.naturalWidth)
          || images.find((img) => img.naturalWidth);
        if (!base) return;
        images.forEach((img) => {
          if (!img.naturalWidth) return;
          img.dataset.scale = String(base.naturalWidth / img.naturalWidth);
        });
      }

      function stageInfo(stage) {
        const img = stage?.querySelector("img[data-camera]");
        if (!stage || !img || !img.naturalWidth || !img.naturalHeight) return null;
        const rect = stage.getBoundingClientRect();
        const [anchorX, anchorY] = activeAnchorForImage(img);
        const effectiveZoom = effectiveZoomForImage(img);
        const left = rect.width / 2 + state.panX - anchorX * effectiveZoom;
        const top = rect.height / 2 + state.panY - anchorY * effectiveZoom;
        return { img, rect, anchorX, anchorY, effectiveZoom, left, top };
      }

      function currentStage() {
        return document.querySelector("[data-stage] img[data-camera]")?.closest("[data-stage]")
          || document.querySelector("[data-stage]");
      }

      function zoomToFitForStage(stage) {
        const info = stageInfo(stage);
        if (!info) return 1;
        const scale = Number(info.img.dataset.scale) || 1;
        return Math.min(info.rect.width / (info.img.naturalWidth * scale), info.rect.height / (info.img.naturalHeight * scale));
      }

      function positionImage(img) {
        if (!img || !img.naturalWidth || !img.naturalHeight) return;
        const stage = img.closest("[data-stage]");
        if (!stage) return;
        const rect = stage.getBoundingClientRect();
        const [anchorX, anchorY] = activeAnchorForImage(img);
        const effectiveZoom = effectiveZoomForImage(img);
        const width = img.naturalWidth * effectiveZoom;
        const height = img.naturalHeight * effectiveZoom;
        img.style.width = `${width}px`;
        img.style.height = `${height}px`;
        img.style.left = `${rect.width / 2 + state.panX - anchorX * effectiveZoom}px`;
        img.style.top = `${rect.height / 2 + state.panY - anchorY * effectiveZoom}px`;
      }

      function positionImages() {
        normalizeImageScales();
        document.querySelectorAll("[data-stage] img[data-camera]").forEach(positionImage);
        updateOverlays();
        updateToolbarLabels();
      }

      function updateOverlays() {
        document.querySelectorAll("[data-stage]").forEach((stage) => {
          const info = stageInfo(stage);
          const viewport = stage.querySelector("[data-minimap-viewport]");
          const meta = stage.querySelector("[data-minimap-meta]");
          const minimapFrame = stage.querySelector("[data-minimap-frame]");
          if (!info || !viewport || !meta || !minimapFrame) return;
          const frameRect = minimapFrame.getBoundingClientRect();
          const imageAspect = info.img.naturalWidth / info.img.naturalHeight;
          const frameAspect = frameRect.width / frameRect.height;
          let mapW = frameRect.width;
          let mapH = frameRect.height;
          let mapX = 0;
          let mapY = 0;
          if (imageAspect > frameAspect) {
            mapH = mapW / imageAspect;
            mapY = (frameRect.height - mapH) / 2;
          } else {
            mapW = mapH * imageAspect;
            mapX = (frameRect.width - mapW) / 2;
          }
          const visibleX = Math.min(info.img.naturalWidth, Math.max(0, -info.left / info.effectiveZoom));
          const visibleY = Math.min(info.img.naturalHeight, Math.max(0, -info.top / info.effectiveZoom));
          const visibleW = Math.max(0, Math.min(info.img.naturalWidth - visibleX, info.rect.width / info.effectiveZoom));
          const visibleH = Math.max(0, Math.min(info.img.naturalHeight - visibleY, info.rect.height / info.effectiveZoom));
          const vpX = mapX + (visibleX / info.img.naturalWidth) * mapW;
          const vpY = mapY + (visibleY / info.img.naturalHeight) * mapH;
          const vpW = Math.max(6, (visibleW / info.img.naturalWidth) * mapW);
          const vpH = Math.max(6, (visibleH / info.img.naturalHeight) * mapH);
          viewport.style.left = `${Math.max(mapX, Math.min(mapX + mapW - vpW, vpX))}px`;
          viewport.style.top = `${Math.max(mapY, Math.min(mapY + mapH - vpH, vpY))}px`;
          viewport.style.width = `${Math.min(mapW, vpW)}px`;
          viewport.style.height = `${Math.min(mapH, vpH)}px`;
          meta.textContent = formatZoom();
        });
      }

      function updateToolbarLabels() {
        const hasMarks = Object.keys(state.anchorOverrides).length || Object.keys(state.cornerOverrides).length;
        maxViewButton.textContent = "最大显示 400%";
        viewButton.textContent = state.view === "single" ? "AB 对比" : "单图";
        L10ToolUI.syncFullscreenButton(fullscreenButton, isFullPageTool);
        markButton.textContent = state.markMode === "center" ? "点击标中心" : "标记中心";
        markCornerButton.textContent = state.markMode === "corner" ? "点击标边角" : "标记边角";
        copyAnchorsButton.textContent = hasMarks ? "复制标记" : "无标记";
      }

      function updateOptionStates() {
        document.querySelectorAll("[data-focal]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.focal === state.focal);
        });
        document.querySelectorAll("[data-group]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.group === state.group);
        });
        viewButton.classList.toggle("is-active", state.view === "single");
        markButton.classList.toggle("is-active", state.markMode === "center");
        markCornerButton.classList.toggle("is-active", state.markMode === "corner");
        document.querySelector("[data-center]")?.classList.toggle("is-active", state.focusMode === "center");
        document.querySelector("[data-corner]")?.classList.toggle("is-active", state.focusMode === "corner");
      }

      function render() {
        chooseDefaults();
        if (!controlsRendered) {
          renderFocalOptions();
          renderGroupOptions();
          controlsRendered = true;
        }
        setZoom(state.zoom);
        updateOptionStates();
        renderGrid();
        requestAnimationFrame(positionImages);
      }

      function articleUrl() {
        const fallback = new URL("../#day-sharpness", window.location.href).href;
        return params.get("return") || fallback;
      }

      function toolFullscreenUrl() {
        const url = new URL(window.location.href);
        url.searchParams.set("fullscreen", "1");
        try {
          const returnUrl = new URL(window.top.location.href);
          returnUrl.hash = "day-sharpness";
          url.searchParams.set("return", returnUrl.href);
        } catch (error) {
          url.searchParams.set("return", articleUrl());
        }
        return url.href;
      }

      function openFullPageTool() {
        window.top.location.href = toolFullscreenUrl();
      }

      function returnToArticle() {
        window.location.href = articleUrl();
      }

      function anchorFromEvent(stage, event) {
        const info = stageInfo(stage);
        if (!info) return null;
        return [
          Math.round((event.clientX - info.rect.left - info.left) / info.effectiveZoom),
          Math.round((event.clientY - info.rect.top - info.top) / info.effectiveZoom)
        ];
      }

      async function copyAnchorOverrides() {
        const center = Object.fromEntries(Object.entries(state.anchorOverrides).sort());
        const corner = Object.fromEntries(Object.entries(state.cornerOverrides).sort());
        if (!Object.keys(center).length && !Object.keys(corner).length) return;
        const text = JSON.stringify({ center, corner }, null, 2);
        try {
          await navigator.clipboard.writeText(text);
          copyAnchorsButton.textContent = "已复制";
        } catch (error) {
          window.prompt("复制这些标记坐标：", text);
        }
      }

      function returnToFocus(focusMode) {
        state.focusMode = focusMode;
        state.markMode = null;
        state.panX = 0;
        state.panY = 0;
        save();
        positionImages();
        updateOptionStates();
      }

      document.addEventListener("input", (event) => {
        const target = event.target;
        if (target.matches("[data-zoom]")) {
          setZoom(Number(target.value));
          positionImages();
          save();
        }
      });

      document.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.matches("[data-focal]")) {
          event.preventDefault();
          event.stopPropagation();
          state.focal = target.dataset.focal;
          state.panX = 0;
          state.panY = 0;
          chooseDefaults();
          save();
          render();
          return;
        }
        if (target.matches("[data-group]")) {
          event.preventDefault();
          event.stopPropagation();
          state.group = target.dataset.group;
          chooseDefaults();
          renderFocalOptions();
          state.panX = 0;
          state.panY = 0;
          save();
          render();
          return;
        }
        if (target.matches("[data-fit]")) {
          event.preventDefault();
          event.stopPropagation();
          setZoom(zoomToFitForStage(currentStage()));
          state.panX = 0;
          state.panY = 0;
          save();
          positionImages();
          return;
        }
        if (target.matches("[data-max-view]")) {
          event.preventDefault();
          event.stopPropagation();
          setZoom(4);
          state.panX = 0;
          state.panY = 0;
          save();
          positionImages();
          return;
        }
        if (target.matches("[data-actual]")) {
          event.preventDefault();
          event.stopPropagation();
          setZoom(1);
          save();
          positionImages();
          return;
        }
        if (target.matches("[data-center]")) {
          event.preventDefault();
          event.stopPropagation();
          returnToFocus("center");
          return;
        }
        if (target.matches("[data-corner]")) {
          event.preventDefault();
          event.stopPropagation();
          returnToFocus("corner");
          return;
        }
        if (target.matches("[data-mark-anchor]")) {
          event.preventDefault();
          event.stopPropagation();
          state.markMode = state.markMode === "center" ? null : "center";
          state.focusMode = "center";
          save();
          positionImages();
          updateOptionStates();
          updateToolbarLabels();
          return;
        }
        if (target.matches("[data-mark-corner]")) {
          event.preventDefault();
          event.stopPropagation();
          state.markMode = state.markMode === "corner" ? null : "corner";
          state.focusMode = "corner";
          save();
          positionImages();
          updateOptionStates();
          updateToolbarLabels();
          return;
        }
        if (target.matches("[data-copy-anchors]")) {
          event.preventDefault();
          event.stopPropagation();
          copyAnchorOverrides();
          return;
        }
        if (target.matches("[data-reset-anchors]")) {
          event.preventDefault();
          event.stopPropagation();
          state.anchorOverrides = {};
          state.cornerOverrides = {};
          state.markMode = null;
          state.focusMode = "center";
          state.panX = 0;
          state.panY = 0;
          save();
          render();
          return;
        }
        if (target.matches("[data-view]")) {
          event.preventDefault();
          event.stopPropagation();
          state.view = state.view === "single" ? "compare" : "single";
          state.panX = 0;
          state.panY = 0;
          save();
          render();
          return;
        }
        if (target.matches("[data-fullscreen]")) {
          event.preventDefault();
          event.stopPropagation();
          if (isFullPageTool) {
            returnToArticle();
          } else {
            openFullPageTool();
          }
        }
      });

      let drag = null;
      document.addEventListener("pointerdown", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        event.preventDefault();
        if (state.markMode) {
          const img = stage.querySelector("img[data-camera]");
          const anchor = anchorFromEvent(stage, event);
          if (img && anchor) {
            if (state.markMode === "corner") {
              state.cornerOverrides[img.dataset.itemId] = anchor;
              state.focusMode = "corner";
            } else {
              state.anchorOverrides[img.dataset.itemId] = anchor;
              state.focusMode = "center";
            }
            state.panX = 0;
            state.panY = 0;
            save();
            render();
          }
          return;
        }
        drag = { x: event.clientX, y: event.clientY, panX: state.panX, panY: state.panY };
        stage.setPointerCapture(event.pointerId);
      });

      document.addEventListener("pointermove", (event) => {
        if (!drag) return;
        event.preventDefault();
        state.panX = drag.panX + event.clientX - drag.x;
        state.panY = drag.panY + event.clientY - drag.y;
        positionImages();
      });

      document.addEventListener("pointerup", (event) => {
        if (!drag) return;
        const stage = event.target.closest("[data-stage]");
        if (stage && stage.hasPointerCapture(event.pointerId)) {
          stage.releasePointerCapture(event.pointerId);
        }
        drag = null;
        save();
      });

      document.addEventListener("pointercancel", () => {
        drag = null;
      });

      document.addEventListener("wheel", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        event.preventDefault();
        const next = Math.min(4, Math.max(0.05, state.zoom + (event.deltaY > 0 ? -0.08 : 0.08)));
        setZoom(next);
        positionImages();
        save();
      }, { passive: false });

      document.addEventListener("keydown", (event) => {
        const tagName = event.target?.tagName || "";
        if (/^(INPUT|TEXTAREA|SELECT)$/.test(tagName)) return;
        const key = event.key.toLowerCase();
        if (key === "c") {
          event.preventDefault();
          returnToFocus("center");
        }
        if (key === "e" || key === "b") {
          event.preventDefault();
          returnToFocus("corner");
        }
      });

      document.addEventListener("load", (event) => {
        if (event.target.matches("[data-stage] img[data-camera]")) {
          event.target.closest("[data-stage]")?.classList.add("is-loaded");
          positionImages();
        }
      }, true);
      document.addEventListener("error", (event) => {
        if (event.target.matches("[data-stage] img[data-camera]")) {
          const stage = event.target.closest("[data-stage]");
          if (stage) {
            stage.classList.add("is-loaded");
            stage.insertAdjacentHTML("beforeend", '<div class="empty-state">图片加载失败</div>');
          }
        }
      }, true);

      window.addEventListener("resize", positionImages);

      async function init() {
        try {
          await loadConfig();
          hydrate();
          chooseDefaults();
          render();
        } catch (error) {
          console.error(error);
          grid.innerHTML = `<div class="empty-state">锐度工具配置加载失败：${escapeHtml(error.message)}</div>`;
        }
      }

      init();
    })();
  </script>
</body>
</html>
