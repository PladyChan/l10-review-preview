<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>L10 RAW Export Comparison</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #090909;
      --panel: #141414;
      --panel-2: #202020;
      --ink: #f2f2f2;
      --body: #cfcfcf;
      --muted: #8b8b8b;
      --line: #343434;
      --accent: #e3322b;
      --focus: #f6d55c;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; min-height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--panel-2);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .app.is-fullscreen,
    .app.is-pseudo-fullscreen {
      width: 100vw;
      height: 100vh;
      background: var(--bg);
    }

    .app.is-pseudo-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
    }

    .toolbar,
    .view-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .toolbar button {
      min-height: 30px;
      padding: 4px 9px;
      font-size: 12px;
    }

    .toolbar {
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .toolbar label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.2;
    }

    .toolbar input[type="range"] {
      width: min(24vw, 180px);
      accent-color: var(--accent);
    }

    select {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--bg);
      color: var(--ink);
      padding: 4px 7px;
      font-size: 12px;
    }

    [data-preset-group] {
      width: min(44vw, 270px);
    }

    [data-preset-iso] {
      width: 98px;
    }

    .main {
      display: block;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: 8px;
      padding: 8px;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .camera-card {
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      min-height: 0;
      height: 100%;
    }

    .stage {
      position: relative;
      min-height: 0;
      height: 100%;
      overflow: hidden;
      background:
        linear-gradient(45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(-45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%),
        linear-gradient(-45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      touch-action: none;
      cursor: grab;
    }

    .stage:active { cursor: grabbing; }

    .image-label {
      position: absolute;
      left: 7px;
      top: 7px;
      z-index: 5;
      display: flex;
      gap: 8px;
      align-items: center;
      max-width: calc(100% - 16px);
      padding: 4px 6px;
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
      background: color-mix(in srgb, var(--panel) 86%, transparent);
      color: var(--ink);
      font-size: 11px;
      line-height: 1.2;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .image-label span {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      white-space: nowrap;
    }

    .stage img {
      position: absolute;
      left: 0;
      top: 0;
      max-width: none;
      width: auto;
      height: auto;
      transform: none;
      user-select: none;
      pointer-events: none;
      image-rendering: auto;
    }

    .stage.is-pixelated img {
      image-rendering: pixelated;
    }

    .corner-control {
      position: absolute;
      right: 10px;
      bottom: 10px;
      z-index: 7;
      width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      backdrop-filter: blur(8px);
      font-family: var(--mono);
      font-size: 18px;
      line-height: 1;
    }

    .minimap {
      position: absolute;
      right: 52px;
      bottom: 10px;
      z-index: 6;
      width: 132px;
      border: 1px solid color-mix(in srgb, var(--line) 88%, transparent);
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      box-shadow: 0 8px 22px color-mix(in srgb, #000 36%, transparent);
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .minimap-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: #050505;
    }

    .minimap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.62;
    }

    .minimap-viewport {
      position: absolute;
      border: 2px solid var(--accent);
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      box-shadow: 0 0 0 999px color-mix(in srgb, #000 22%, transparent);
    }

    .minimap-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 6px;
      color: var(--body);
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1.1;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      body {
        overflow: hidden;
      }

      .app {
        height: 100vh;
        overflow: hidden;
      }
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .main,
      .compare-grid {
        overflow: visible;
      }

      .compare-grid {
        grid-template-columns: 1fr;
      }

      .camera-card {
        min-height: 72vh;
      }

      .toolbar {
        align-items: stretch;
      }

      .toolbar input[type="range"] {
        width: 100%;
      }

      .toolbar button,
      .view-controls {
        flex: 1 1 auto;
      }

      .minimap {
        width: 112px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar" aria-label="对比控制">
      <label>对比组
        <select data-preset-group></select>
      </label>
      <label>ISO
        <select data-preset-iso></select>
      </label>
      <label>缩放
        <input type="range" min="0.05" max="4" step="0.01" value="1" data-zoom>
      </label>
      <div class="view-controls">
        <button type="button" data-fit>适合窗口</button>
        <button type="button" data-max-view>最大显示</button>
        <button type="button" data-actual>100%</button>
        <button type="button" data-center>回到中心</button>
        <button type="button" data-fullscreen>全屏</button>
      </div>
    </div>

    <div class="main">
      <section class="compare-grid" data-grid></section>
    </div>
  </div>

  <script>
    (() => {
      const presetGroups = [
        {
          id: "L10_28mm_vs_GR4_28mm",
          label: "L10 28mm vs GR4 28mm",
          cameras: [
            { id: "l10", name: "Panasonic Lumix DC-L10", focal: "28mm", prefix: "01_L10_28mm" },
            { id: "gr4", name: "Ricoh GR IV", focal: "28mm", prefix: "02_GR4_28mm" }
          ]
        },
        {
          id: "L10_35mm_vs_S9_35mm",
          label: "L10 35mm vs S9 35mm",
          cameras: [
            { id: "l10", name: "Panasonic Lumix DC-L10", focal: "35mm", prefix: "01_L10_35mm" },
            { id: "s9", name: "Panasonic Lumix DC-S9", focal: "35mm", prefix: "02_S9_35mm" }
          ]
        },
        {
          id: "L10_35mm_vs_X100VI_35mm",
          label: "L10 35mm vs X100VI 35mm",
          cameras: [
            { id: "l10", name: "Panasonic Lumix DC-L10", focal: "35mm", prefix: "01_L10_35mm" },
            { id: "x100vi", name: "Fujifilm X100VI", focal: "35mm", prefix: "02_X100VI_35mm" }
          ]
        }
      ];
      const presetIsos = ["ISO1600", "ISO3200", "ISO6400", "ISO12800"];
      const assetBase = "studio-assets/raw";
      const storageKey = "l10-studio-comparison-view-v2";
      const ifcAnchors = {
        L10_28mm_vs_GR4_28mm: {
          ISO1600: { l10: [1831, 1286], gr4: [1762, 1253] },
          ISO3200: { l10: [1828, 1290], gr4: [1760, 1254] },
          ISO6400: { l10: [1824, 1286], gr4: [1761, 1253] },
          ISO12800: { l10: [1828, 1283], gr4: [1760, 1251] }
        },
        L10_35mm_vs_S9_35mm: {
          ISO1600: { l10: [1846, 1272], s9: [1798, 1126] },
          ISO3200: { l10: [1850, 1273], s9: [1802, 1119] },
          ISO6400: { l10: [1846, 1274], s9: [1794, 1125] },
          ISO12800: { l10: [1856, 1268], s9: [1798, 1126] }
        },
        L10_35mm_vs_X100VI_35mm: {
          ISO1600: { l10: [1846, 1272], x100vi: [1787, 1198] },
          ISO3200: { l10: [1850, 1273], x100vi: [1788, 1200] },
          ISO6400: { l10: [1846, 1274], x100vi: [1786, 1194] },
          ISO12800: { l10: [1856, 1268], x100vi: [1796, 1192] }
        }
      };
      const state = {
        format: "raw",
        presetGroup: "L10_28mm_vs_GR4_28mm",
        presetIso: "ISO1600",
        zoom: 1,
        panX: 0,
        panY: 0,
        cameras: []
      };

      const grid = document.querySelector("[data-grid]");
      const zoomInput = document.querySelector("[data-zoom]");
      const presetGroupSelect = document.querySelector("[data-preset-group]");
      const presetIsoSelect = document.querySelector("[data-preset-iso]");
      const app = document.querySelector(".app");
      const maxViewButton = document.querySelector("[data-max-view]");
      const fullscreenButton = document.querySelector("[data-fullscreen]");

      const save = () => {
        try {
          localStorage.setItem(storageKey, JSON.stringify(state));
        } catch (error) {
          console.warn("Local save failed", error);
        }
      };

      const activeSrc = (camera) => camera[state.format] || "";

      function groupFor(id) {
        return presetGroups.find((group) => group.id === id) || presetGroups[0];
      }

      function assetPath(groupId, iso, camera) {
        return `${assetBase}/${groupId}/${iso}/${camera.prefix}_${iso}.jpg`;
      }

      function buildPresetCameras(groupId, iso) {
        const group = groupFor(groupId);
        return group.cameras.map((camera) => ({
          id: camera.id,
          name: camera.name,
          iso: iso.replace("ISO", ""),
          focal: camera.focal,
          anchor: ifcAnchors[group.id]?.[iso]?.[camera.id] || null,
          jpg: "",
          raw: assetPath(group.id, iso, camera)
        }));
      }

      function applyPreset() {
        state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        state.format = "raw";
        state.panX = 0;
        state.panY = 0;
        state.zoom = 1;
        save();
        render();
      }

      function formatZoom(value = state.zoom) {
        return `${Math.round(value * 100)}%`;
      }

      function stageInfo(stage) {
        const img = stage?.querySelector("img");
        if (!stage || !img || !img.naturalWidth || !img.naturalHeight) return null;
        const rect = stage.getBoundingClientRect();
        const anchorX = Number(img.dataset.anchorX) || img.naturalWidth / 2;
        const anchorY = Number(img.dataset.anchorY) || img.naturalHeight / 2;
        const left = rect.width / 2 + state.panX - anchorX * state.zoom;
        const top = rect.height / 2 + state.panY - anchorY * state.zoom;
        return { img, rect, anchorX, anchorY, left, top };
      }

      function zoomToFitForStage(stage) {
        const info = stageInfo(stage);
        if (!info) return 1;
        return Math.min(info.rect.width / info.img.naturalWidth, info.rect.height / info.img.naturalHeight);
      }

      function zoomToMaxVisibleForStage(stage) {
        const info = stageInfo(stage);
        if (!info) return 1;
        return Math.max(info.rect.width / info.img.naturalWidth, info.rect.height / info.img.naturalHeight);
      }

      function currentStage() {
        return document.querySelector("[data-stage]");
      }

      function setZoom(value) {
        state.zoom = Math.min(4, Math.max(0.05, Math.round(value * 100) / 100));
        zoomInput.value = String(state.zoom);
      }

      function positionImage(img) {
        if (!img || !img.naturalWidth || !img.naturalHeight) return;
        const stage = img.closest("[data-stage]");
        if (!stage) return;
        const rect = stage.getBoundingClientRect();
        const anchorX = Number(img.dataset.anchorX) || img.naturalWidth / 2;
        const anchorY = Number(img.dataset.anchorY) || img.naturalHeight / 2;
        const width = img.naturalWidth * state.zoom;
        const height = img.naturalHeight * state.zoom;
        img.style.width = `${width}px`;
        img.style.height = `${height}px`;
        img.style.left = `${rect.width / 2 + state.panX - anchorX * state.zoom}px`;
        img.style.top = `${rect.height / 2 + state.panY - anchorY * state.zoom}px`;
      }

      function positionImages() {
        document.querySelectorAll("[data-stage] img").forEach(positionImage);
        updateOverlays();
        updateToolbarLabels();
      }

      function updateToolbarLabels() {
        const maxZoom = zoomToMaxVisibleForStage(currentStage());
        maxViewButton.textContent = `最大显示 ${formatZoom(maxZoom)}`;
        fullscreenButton.textContent = isFullscreenView() ? "缩小" : "全屏";
      }

      function isFullscreenView() {
        return Boolean(document.fullscreenElement) || app.classList.contains("is-pseudo-fullscreen");
      }

      async function enterFullscreenView() {
        app.classList.add("is-pseudo-fullscreen");
        updateToolbarLabels();
        positionImages();
      }

      async function exitFullscreenView() {
        app.classList.remove("is-pseudo-fullscreen");
        updateToolbarLabels();
        positionImages();
      }

      function updateOverlays() {
        document.querySelectorAll("[data-stage]").forEach((stage) => {
          const info = stageInfo(stage);
          const viewport = stage.querySelector("[data-minimap-viewport]");
          const meta = stage.querySelector("[data-minimap-meta]");
          if (!info || !viewport || !meta) return;
          const minimapFrame = stage.querySelector("[data-minimap-frame]");
          const frameRect = minimapFrame.getBoundingClientRect();
          const imageAspect = info.img.naturalWidth / info.img.naturalHeight;
          const frameAspect = frameRect.width / frameRect.height;
          let mapW = frameRect.width;
          let mapH = frameRect.height;
          let mapX = 0;
          let mapY = 0;
          if (imageAspect > frameAspect) {
            mapH = mapW / imageAspect;
            mapY = (frameRect.height - mapH) / 2;
          } else {
            mapW = mapH * imageAspect;
            mapX = (frameRect.width - mapW) / 2;
          }
          const visibleX = Math.min(info.img.naturalWidth, Math.max(0, -info.left / state.zoom));
          const visibleY = Math.min(info.img.naturalHeight, Math.max(0, -info.top / state.zoom));
          const visibleW = Math.max(0, Math.min(info.img.naturalWidth - visibleX, info.rect.width / state.zoom));
          const visibleH = Math.max(0, Math.min(info.img.naturalHeight - visibleY, info.rect.height / state.zoom));
          const vpX = mapX + (visibleX / info.img.naturalWidth) * mapW;
          const vpY = mapY + (visibleY / info.img.naturalHeight) * mapH;
          const vpW = Math.max(6, (visibleW / info.img.naturalWidth) * mapW);
          const vpH = Math.max(6, (visibleH / info.img.naturalHeight) * mapH);
          viewport.style.left = `${Math.max(mapX, Math.min(mapX + mapW - vpW, vpX))}px`;
          viewport.style.top = `${Math.max(mapY, Math.min(mapY + mapH - vpH, vpY))}px`;
          viewport.style.width = `${Math.min(mapW, vpW)}px`;
          viewport.style.height = `${Math.min(mapH, vpH)}px`;
          const centerX = Math.round(((visibleX + visibleW / 2) / info.img.naturalWidth) * 100);
          const centerY = Math.round(((visibleY + visibleH / 2) / info.img.naturalHeight) * 100);
          meta.innerHTML = `<span>${formatZoom()}</span><span>X ${centerX} / Y ${centerY}</span>`;
        });
      }

      function renderGrid() {
        grid.innerHTML = state.cameras.map((camera) => {
          const src = activeSrc(camera);
          const label = state.format.toUpperCase();
          return `
            <article class="camera-card" data-card="${camera.id}">
              <div class="stage" data-stage>
                ${src ? `<img src="${src}" alt="${escapeHtml(camera.name)} ${label} crop" data-anchor-x="${camera.anchor ? camera.anchor[0] : ""}" data-anchor-y="${camera.anchor ? camera.anchor[1] : ""}">` : `<div class="empty-state">没有找到 ${escapeHtml(camera.name)} 的 ${label} 内置素材</div>`}
                <div class="image-label"><strong>${escapeHtml(camera.name)}</strong><span>${escapeHtml(camera.focal || "-")} · ISO ${escapeHtml(camera.iso)}</span></div>
                ${src ? `<div class="minimap"><div class="minimap-frame" data-minimap-frame><img src="${src}" alt=""><div class="minimap-viewport" data-minimap-viewport></div></div><div class="minimap-meta" data-minimap-meta><span>${formatZoom()}</span><span>X50 Y50</span></div></div><button class="corner-control" type="button" data-corner title="定位到画面右下角" aria-label="定位到画面右下角">⌟</button>` : ""}
              </div>
            </article>
          `;
        }).join("");
      }

      function render() {
        zoomInput.value = String(state.zoom);
        presetGroupSelect.value = state.presetGroup;
        presetIsoSelect.value = state.presetIso;
        renderGrid();
        requestAnimationFrame(positionImages);
      }

      function hydrate() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (saved) {
            state.presetGroup = saved.presetGroup || state.presetGroup;
            state.presetIso = saved.presetIso || state.presetIso;
            state.zoom = Number(saved.zoom || state.zoom);
            state.panX = Number(saved.panX || 0);
            state.panY = Number(saved.panY || 0);
          }
          state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        } catch (error) {
          console.warn("Local restore failed", error);
          state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        }
      }

      function renderPresetOptions() {
        presetGroupSelect.innerHTML = presetGroups.map((group) => (
          `<option value="${escapeHtml(group.id)}">${escapeHtml(group.label)}</option>`
        )).join("");
        presetIsoSelect.innerHTML = presetIsos.map((iso) => (
          `<option value="${escapeHtml(iso)}">${escapeHtml(iso.replace("ISO", "ISO "))}</option>`
        )).join("");
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char]));
      }

      document.addEventListener("input", (event) => {
        const target = event.target;
        if (target.matches("[data-zoom]")) {
          setZoom(Number(target.value));
          positionImages();
          save();
        }
      });

      document.addEventListener("change", (event) => {
        const target = event.target;
        if (target.matches("[data-preset-group]")) {
          state.presetGroup = target.value;
          applyPreset();
        }
        if (target.matches("[data-preset-iso]")) {
          state.presetIso = target.value;
          applyPreset();
        }
      });

      document.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.matches("[data-fit]")) {
          setZoom(zoomToFitForStage(currentStage()));
          state.panX = 0;
          state.panY = 0;
          save();
          positionImages();
        }
        if (target.matches("[data-max-view]")) {
          setZoom(zoomToMaxVisibleForStage(currentStage()));
          state.panX = 0;
          state.panY = 0;
          save();
          positionImages();
        }
        if (target.matches("[data-actual]")) {
          setZoom(1);
          save();
          positionImages();
        }
        if (target.matches("[data-center]")) {
          state.panX = 0;
          state.panY = 0;
          save();
          positionImages();
        }
        if (target.matches("[data-corner]")) {
          const stage = target.closest("[data-stage]");
          const info = stageInfo(stage);
          if (!info) return;
          state.panX = info.anchorX * state.zoom + info.rect.width / 2 - info.img.naturalWidth * state.zoom;
          state.panY = info.anchorY * state.zoom + info.rect.height / 2 - info.img.naturalHeight * state.zoom;
          save();
          positionImages();
        }
        if (target.matches("[data-fullscreen]")) {
          if (isFullscreenView()) {
            exitFullscreenView();
          } else {
            enterFullscreenView();
          }
        }
      });

      let drag = null;
      document.addEventListener("pointerdown", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        drag = { x: event.clientX, y: event.clientY, panX: state.panX, panY: state.panY };
        stage.setPointerCapture(event.pointerId);
      });

      document.addEventListener("pointermove", (event) => {
        if (!drag) return;
        state.panX = drag.panX + event.clientX - drag.x;
        state.panY = drag.panY + event.clientY - drag.y;
        positionImages();
      });

      document.addEventListener("pointerup", () => {
        if (!drag) return;
        drag = null;
        save();
      });

      document.addEventListener("wheel", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        event.preventDefault();
        const next = Math.min(4, Math.max(0.05, state.zoom + (event.deltaY > 0 ? -0.08 : 0.08)));
        setZoom(next);
        positionImages();
        save();
      }, { passive: false });

      document.addEventListener("load", (event) => {
        if (event.target.matches("[data-stage] img")) positionImage(event.target);
      }, true);
      window.addEventListener("resize", positionImages);
      document.addEventListener("fullscreenchange", () => {
        app.classList.toggle("is-fullscreen", Boolean(document.fullscreenElement));
        if (!document.fullscreenElement) app.classList.remove("is-pseudo-fullscreen");
        positionImages();
      });

      renderPresetOptions();
      hydrate();
      render();
    })();
  </script>
</body>
</html>
