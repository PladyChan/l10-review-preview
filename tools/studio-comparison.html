<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>L10 RAW Export Comparison</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #090909;
      --panel: #141414;
      --panel-2: #202020;
      --ink: #f2f2f2;
      --body: #cfcfcf;
      --muted: #8b8b8b;
      --line: #343434;
      --accent: #e3322b;
      --focus: #f6d55c;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; min-height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--panel-2);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .toolbar,
    .view-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .toolbar button {
      min-height: 30px;
      padding: 4px 9px;
      font-size: 12px;
    }

    .toolbar {
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .toolbar label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.2;
    }

    .toolbar input[type="range"] {
      width: min(24vw, 180px);
      accent-color: var(--accent);
    }

    select {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--bg);
      color: var(--ink);
      padding: 4px 7px;
      font-size: 12px;
    }

    [data-preset-group] {
      width: min(44vw, 270px);
    }

    [data-preset-iso] {
      width: 98px;
    }

    .main {
      display: block;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: 8px;
      padding: 8px;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .camera-card {
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      min-height: 0;
      height: 100%;
    }

    .stage {
      position: relative;
      min-height: 0;
      height: 100%;
      overflow: hidden;
      background:
        linear-gradient(45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(-45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%),
        linear-gradient(-45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      touch-action: none;
      cursor: grab;
    }

    .stage:active { cursor: grabbing; }

    .image-label {
      position: absolute;
      left: 7px;
      top: 7px;
      z-index: 5;
      display: flex;
      gap: 8px;
      align-items: center;
      max-width: calc(100% - 16px);
      padding: 4px 6px;
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
      background: color-mix(in srgb, var(--panel) 86%, transparent);
      color: var(--ink);
      font-size: 11px;
      line-height: 1.2;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .image-label span {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      white-space: nowrap;
    }

    .stage img {
      position: absolute;
      left: 0;
      top: 0;
      max-width: none;
      width: auto;
      height: auto;
      transform: none;
      user-select: none;
      pointer-events: none;
      image-rendering: auto;
    }

    .stage.is-pixelated img {
      image-rendering: pixelated;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      z-index: 4;
      pointer-events: none;
      background: color-mix(in srgb, var(--focus) 74%, transparent);
    }

    .reticle::before {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
    }

    .reticle::after {
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
    }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      body {
        overflow: hidden;
      }

      .app {
        height: 100vh;
        overflow: hidden;
      }
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .main,
      .compare-grid {
        overflow: visible;
      }

      .compare-grid {
        grid-template-columns: 1fr;
      }

      .camera-card {
        min-height: 72vh;
      }

      .toolbar {
        align-items: stretch;
      }

      .toolbar input[type="range"] {
        width: 100%;
      }

      .toolbar button,
      .view-controls {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar" aria-label="对比控制">
      <label>对比组
        <select data-preset-group></select>
      </label>
      <label>ISO
        <select data-preset-iso></select>
      </label>
      <label>缩放
        <input type="range" min="0.35" max="4" step="0.05" value="1" data-zoom>
      </label>
      <div class="view-controls">
        <button type="button" data-fit>适合窗口</button>
        <button type="button" data-actual>100%</button>
        <button type="button" data-center>回到中心</button>
        <button type="button" data-reticle class="is-active">十字线</button>
      </div>
    </div>

    <div class="main">
      <section class="compare-grid" data-grid></section>
    </div>
  </div>

  <script>
    (() => {
      const presetGroups = [
        {
          id: "L10_28mm_vs_GR4_28mm",
          label: "L10 28mm vs GR4 28mm",
          cameras: [
            { id: "l10", name: "Panasonic Lumix DC-L10", focal: "28mm", prefix: "01_L10_28mm" },
            { id: "gr4", name: "Ricoh GR IV", focal: "28mm", prefix: "02_GR4_28mm" }
          ]
        },
        {
          id: "L10_35mm_vs_S9_35mm",
          label: "L10 35mm vs S9 35mm",
          cameras: [
            { id: "l10", name: "Panasonic Lumix DC-L10", focal: "35mm", prefix: "01_L10_35mm" },
            { id: "s9", name: "Panasonic Lumix DC-S9", focal: "35mm", prefix: "02_S9_35mm" }
          ]
        },
        {
          id: "L10_35mm_vs_X100VI_35mm",
          label: "L10 35mm vs X100VI 35mm",
          cameras: [
            { id: "l10", name: "Panasonic Lumix DC-L10", focal: "35mm", prefix: "01_L10_35mm" },
            { id: "x100vi", name: "Fujifilm X100VI", focal: "35mm", prefix: "02_X100VI_35mm" }
          ]
        }
      ];
      const presetIsos = ["ISO1600", "ISO3200", "ISO6400", "ISO12800"];
      const assetBase = "studio-assets/raw";
      const storageKey = "l10-studio-comparison-view-v2";
      const ifcAnchors = {
        L10_28mm_vs_GR4_28mm: {
          ISO1600: { l10: [1831, 1286], gr4: [1762, 1253] },
          ISO3200: { l10: [1828, 1290], gr4: [1760, 1254] },
          ISO6400: { l10: [1824, 1286], gr4: [1761, 1253] },
          ISO12800: { l10: [1828, 1283], gr4: [1760, 1251] }
        },
        L10_35mm_vs_S9_35mm: {
          ISO1600: { l10: [1846, 1272], s9: [1798, 1126] },
          ISO3200: { l10: [1850, 1273], s9: [1802, 1119] },
          ISO6400: { l10: [1846, 1274], s9: [1794, 1125] },
          ISO12800: { l10: [1856, 1268], s9: [1798, 1126] }
        },
        L10_35mm_vs_X100VI_35mm: {
          ISO1600: { l10: [1846, 1272], x100vi: [1787, 1198] },
          ISO3200: { l10: [1850, 1273], x100vi: [1788, 1200] },
          ISO6400: { l10: [1846, 1274], x100vi: [1786, 1194] },
          ISO12800: { l10: [1856, 1268], x100vi: [1796, 1192] }
        }
      };
      const state = {
        format: "raw",
        presetGroup: "L10_28mm_vs_GR4_28mm",
        presetIso: "ISO1600",
        zoom: 1,
        panX: 0,
        panY: 0,
        reticle: true,
        cameras: []
      };

      const grid = document.querySelector("[data-grid]");
      const zoomInput = document.querySelector("[data-zoom]");
      const presetGroupSelect = document.querySelector("[data-preset-group]");
      const presetIsoSelect = document.querySelector("[data-preset-iso]");

      const save = () => {
        try {
          localStorage.setItem(storageKey, JSON.stringify(state));
        } catch (error) {
          console.warn("Local save failed", error);
        }
      };

      const activeSrc = (camera) => camera[state.format] || "";

      function groupFor(id) {
        return presetGroups.find((group) => group.id === id) || presetGroups[0];
      }

      function assetPath(groupId, iso, camera) {
        return `${assetBase}/${groupId}/${iso}/${camera.prefix}_${iso}.jpg`;
      }

      function buildPresetCameras(groupId, iso) {
        const group = groupFor(groupId);
        return group.cameras.map((camera) => ({
          id: camera.id,
          name: camera.name,
          iso: iso.replace("ISO", ""),
          focal: camera.focal,
          anchor: ifcAnchors[group.id]?.[iso]?.[camera.id] || null,
          jpg: "",
          raw: assetPath(group.id, iso, camera)
        }));
      }

      function applyPreset() {
        state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        state.format = "raw";
        state.panX = 0;
        state.panY = 0;
        state.zoom = 1;
        save();
        render();
      }

      function positionImage(img) {
        if (!img || !img.naturalWidth || !img.naturalHeight) return;
        const stage = img.closest("[data-stage]");
        if (!stage) return;
        const rect = stage.getBoundingClientRect();
        const anchorX = Number(img.dataset.anchorX) || img.naturalWidth / 2;
        const anchorY = Number(img.dataset.anchorY) || img.naturalHeight / 2;
        const width = img.naturalWidth * state.zoom;
        const height = img.naturalHeight * state.zoom;
        img.style.width = `${width}px`;
        img.style.height = `${height}px`;
        img.style.left = `${rect.width / 2 + state.panX - anchorX * state.zoom}px`;
        img.style.top = `${rect.height / 2 + state.panY - anchorY * state.zoom}px`;
      }

      function positionImages() {
        document.querySelectorAll("[data-stage] img").forEach(positionImage);
      }

      function renderGrid() {
        grid.innerHTML = state.cameras.map((camera) => {
          const src = activeSrc(camera);
          const label = state.format.toUpperCase();
          return `
            <article class="camera-card" data-card="${camera.id}">
              <div class="stage ${state.reticle ? "reticle" : ""}" data-stage>
                ${src ? `<img src="${src}" alt="${escapeHtml(camera.name)} ${label} crop" data-anchor-x="${camera.anchor ? camera.anchor[0] : ""}" data-anchor-y="${camera.anchor ? camera.anchor[1] : ""}">` : `<div class="empty-state">没有找到 ${escapeHtml(camera.name)} 的 ${label} 内置素材</div>`}
                <div class="image-label"><strong>${escapeHtml(camera.name)}</strong><span>${escapeHtml(camera.focal || "-")} · ISO ${escapeHtml(camera.iso)}</span></div>
              </div>
            </article>
          `;
        }).join("");
      }

      function render() {
        zoomInput.value = String(state.zoom);
        presetGroupSelect.value = state.presetGroup;
        presetIsoSelect.value = state.presetIso;
        document.querySelector("[data-reticle]").classList.toggle("is-active", state.reticle);
        renderGrid();
        requestAnimationFrame(positionImages);
      }

      function hydrate() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (saved) {
            state.presetGroup = saved.presetGroup || state.presetGroup;
            state.presetIso = saved.presetIso || state.presetIso;
            state.zoom = Number(saved.zoom || state.zoom);
            state.panX = Number(saved.panX || 0);
            state.panY = Number(saved.panY || 0);
            state.reticle = saved.reticle !== undefined ? Boolean(saved.reticle) : state.reticle;
          }
          state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        } catch (error) {
          console.warn("Local restore failed", error);
          state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        }
      }

      function renderPresetOptions() {
        presetGroupSelect.innerHTML = presetGroups.map((group) => (
          `<option value="${escapeHtml(group.id)}">${escapeHtml(group.label)}</option>`
        )).join("");
        presetIsoSelect.innerHTML = presetIsos.map((iso) => (
          `<option value="${escapeHtml(iso)}">${escapeHtml(iso.replace("ISO", "ISO "))}</option>`
        )).join("");
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char]));
      }

      document.addEventListener("input", (event) => {
        const target = event.target;
        if (target.matches("[data-zoom]")) {
          state.zoom = Number(target.value);
          positionImages();
          save();
        }
      });

      document.addEventListener("change", (event) => {
        const target = event.target;
        if (target.matches("[data-preset-group]")) {
          state.presetGroup = target.value;
          applyPreset();
        }
        if (target.matches("[data-preset-iso]")) {
          state.presetIso = target.value;
          applyPreset();
        }
      });

      document.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.matches("[data-fit]")) {
          state.zoom = 0.7;
          state.panX = 0;
          state.panY = 0;
          save();
          render();
        }
        if (target.matches("[data-actual]")) {
          state.zoom = 1;
          save();
          render();
        }
        if (target.matches("[data-center]")) {
          state.panX = 0;
          state.panY = 0;
          save();
          render();
        }
        if (target.matches("[data-reticle]")) {
          state.reticle = !state.reticle;
          save();
          render();
        }
      });

      let drag = null;
      document.addEventListener("pointerdown", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        drag = { x: event.clientX, y: event.clientY, panX: state.panX, panY: state.panY };
        stage.setPointerCapture(event.pointerId);
      });

      document.addEventListener("pointermove", (event) => {
        if (!drag) return;
        state.panX = drag.panX + event.clientX - drag.x;
        state.panY = drag.panY + event.clientY - drag.y;
        positionImages();
      });

      document.addEventListener("pointerup", () => {
        if (!drag) return;
        drag = null;
        save();
      });

      document.addEventListener("wheel", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        event.preventDefault();
        const next = Math.min(4, Math.max(0.35, state.zoom + (event.deltaY > 0 ? -0.08 : 0.08)));
        state.zoom = Math.round(next * 100) / 100;
        zoomInput.value = String(state.zoom);
        positionImages();
        save();
      }, { passive: false });

      document.addEventListener("load", (event) => {
        if (event.target.matches("[data-stage] img")) positionImage(event.target);
      }, true);
      window.addEventListener("resize", positionImages);

      renderPresetOptions();
      hydrate();
      render();
    })();
  </script>
</body>
</html>
