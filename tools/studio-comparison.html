<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>L10 RAW Export Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark light;
      --bg: #090909;
      --panel: #141414;
      --panel-2: #202020;
      --ink: #f2f2f2;
      --body: #cfcfcf;
      --muted: #8b8b8b;
      --line: #343434;
      --accent: #e3322b;
      --focus: #f6d55c;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
      --doto: "Doto", "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; min-height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.45;
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--panel-2);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .toolbar,
    .view-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .toolbar button {
      min-height: 30px;
      padding: 4px 9px;
      font-family: var(--doto);
      font-weight: 700;
      font-size: 12px;
    }

    .toolbar {
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .toolbar label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-family: var(--doto);
      font-weight: 700;
      font-size: 11px;
      line-height: 1.2;
    }

    .toolbar input[type="range"] {
      width: min(24vw, 180px);
      accent-color: var(--accent);
    }

    .segmented {
      display: flex;
      gap: 4px;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .segmented::-webkit-scrollbar {
      display: none;
    }

    .segmented button {
      white-space: nowrap;
    }

    .group-options {
      max-width: min(52vw, 520px);
    }

    .iso-options {
      max-width: min(36vw, 360px);
    }

    .main {
      display: block;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: 8px;
      padding: 8px;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .camera-card {
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      min-height: 0;
      height: 100%;
    }

    .stage {
      position: relative;
      min-height: 0;
      height: 100%;
      overflow: hidden;
      background:
        linear-gradient(45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(-45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%),
        linear-gradient(-45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      touch-action: none;
      cursor: grab;
    }

    .stage:active { cursor: grabbing; }

    .image-label {
      position: absolute;
      left: 7px;
      top: 7px;
      z-index: 5;
      display: flex;
      gap: 8px;
      align-items: center;
      max-width: calc(100% - 16px);
      padding: 4px 6px;
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
      background: color-mix(in srgb, var(--panel) 86%, transparent);
      color: var(--ink);
      font-size: 11px;
      line-height: 1.2;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .image-label span {
      color: var(--muted);
      font-family: var(--doto);
      font-weight: 700;
      font-size: 10px;
      white-space: nowrap;
    }

    .stage img {
      position: absolute;
      left: 0;
      top: 0;
      max-width: none;
      width: auto;
      height: auto;
      transform: none;
      user-select: none;
      pointer-events: none;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    .minimap {
      position: absolute;
      right: 52px;
      bottom: 10px;
      z-index: 6;
      width: 132px;
      border: 1px solid color-mix(in srgb, var(--line) 88%, transparent);
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      box-shadow: 0 8px 22px color-mix(in srgb, #000 36%, transparent);
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .minimap-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: #050505;
    }

    .minimap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.62;
    }

    .minimap-viewport {
      position: absolute;
      border: 2px solid var(--accent);
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      box-shadow: 0 0 0 999px color-mix(in srgb, #000 22%, transparent);
    }

    .minimap-meta {
      position: absolute;
      right: 5px;
      bottom: 5px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      padding: 4px 6px;
      border: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
      background: color-mix(in srgb, #000 72%, transparent);
      color: var(--body);
      font-family: var(--doto);
      font-weight: 700;
      font-size: 10px;
      line-height: 1.1;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .loading-state {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 8;
      display: grid;
      place-items: center;
      color: var(--ink);
      pointer-events: none;
    }

    .loading-pill {
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
    }

    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid color-mix(in srgb, var(--muted) 38%, transparent);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .stage.is-loaded .loading-state {
      display: none;
    }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      body {
        overflow: hidden;
      }

      .app {
        height: 100vh;
        overflow: hidden;
      }
    }

    @media (max-width: 720px) {
      body {
        overflow: hidden;
      }

      .app {
        height: 100dvh;
        min-height: 100dvh;
        overflow: hidden;
      }

      .main,
      .compare-grid {
        overflow: hidden;
      }

      .compare-grid {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(2, minmax(0, 1fr));
        gap: 4px;
        padding: 4px;
        height: 100%;
      }

      .camera-card {
        min-height: 0;
        height: 100%;
      }

      .toolbar {
        align-items: end;
        gap: 6px;
        padding: 6px;
      }

      .toolbar input[type="range"] {
        width: min(34vw, 150px);
      }

      .group-options,
      .iso-options {
        max-width: 100%;
      }

      .toolbar label {
        font-size: 10px;
      }

      .toolbar button {
        min-height: 28px;
        padding: 3px 7px;
        font-size: 11px;
      }

      .view-controls {
        gap: 5px;
        flex: 1 1 100%;
      }

      .view-controls button {
        flex: 1 1 auto;
      }

      .minimap {
        right: 42px;
        bottom: 8px;
        width: min(82px, 28vw);
      }

      .image-label {
        left: 5px;
        top: 5px;
        max-width: calc(100% - 10px);
        gap: 5px;
        padding: 3px 5px;
        font-size: 10px;
      }

      .image-label span,
      .minimap-meta {
        font-size: 9px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar" aria-label="对比控制">
      <label>对比组
        <div class="segmented group-options" data-preset-group></div>
      </label>
      <label>ISO
        <div class="segmented iso-options" data-preset-iso></div>
      </label>
      <label>缩放
        <input type="range" min="0.05" max="4" step="0.01" value="1" data-zoom>
      </label>
      <div class="view-controls">
        <button type="button" data-fit>适合窗口</button>
        <button type="button" data-max-view>最大显示</button>
        <button type="button" data-actual>100%</button>
        <button type="button" data-center>回到中心</button>
        <button type="button" data-corner>定位边角</button>
        <button type="button" data-fullscreen>全屏</button>
      </div>
    </div>

    <div class="main">
      <section class="compare-grid" data-grid></section>
    </div>
  </div>

  <script>
    (() => {
      let presetGroups = [];
      let presetIsos = [];
      let assetBase = "studio-assets/raw";
      let storageKey = "l10-studio-comparison-view";
      let scaleBaseCamera = "l10";
      const state = {
        format: "raw",
        presetGroup: "L10_28mm_vs_GR4_28mm",
        presetIso: "ISO1600",
        anchorMode: "ifc",
        zoom: 1,
        panX: 0,
        panY: 0,
        cameras: []
      };

      const grid = document.querySelector("[data-grid]");
      const zoomInput = document.querySelector("[data-zoom]");
      const presetGroupSelect = document.querySelector("[data-preset-group]");
      const presetIsoSelect = document.querySelector("[data-preset-iso]");
      const maxViewButton = document.querySelector("[data-max-view]");
      const fullscreenButton = document.querySelector("[data-fullscreen]");
      const isEmbedded = window.self !== window.top;
      const params = new URLSearchParams(window.location.search);
      const isFullPageTool = !isEmbedded;

      async function loadToolConfig() {
        const response = await fetch("studio-comparison-config.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Config request failed: ${response.status}`);
        }
        const config = await response.json();
        presetGroups = Array.isArray(config.groups) ? config.groups : [];
        presetIsos = Array.isArray(config.isos) ? config.isos : [];
        assetBase = config.assetBase || assetBase;
        storageKey = config.storageKey || storageKey;
        scaleBaseCamera = config.scaleBaseCamera || scaleBaseCamera;
        if (!presetGroups.length || !presetIsos.length) {
          throw new Error("Config must include groups and isos.");
        }
        state.presetGroup = presetGroups[0].id;
        state.presetIso = presetIsos[0];
      }

      const save = () => {
        try {
          localStorage.setItem(storageKey, JSON.stringify(state));
        } catch (error) {
          console.warn("Local save failed", error);
        }
      };

      const activeSrc = (camera) => camera[state.format] || "";

      function groupFor(id) {
        return presetGroups.find((group) => group.id === id) || presetGroups[0];
      }

      function assetPath(groupId, iso, camera) {
        return `${assetBase}/${groupId}/${iso}/${camera.prefix}_${iso}.jpg`;
      }

      function buildPresetCameras(groupId, iso) {
        const group = groupFor(groupId);
        if (!group) return [];
        return group.cameras.map((camera) => ({
          id: camera.id,
          name: camera.name,
          iso: iso.replace("ISO", ""),
          focal: camera.focal,
          anchor: group.anchors?.ifc?.[camera.id] || null,
          corner: group.anchors?.corner?.[camera.id] || null,
          scale: 1,
          jpg: "",
          raw: assetPath(group.id, iso, camera)
        }));
      }

      function applyPreset() {
        state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        state.format = "raw";
        state.anchorMode = "ifc";
        state.panX = 0;
        state.panY = 0;
        state.zoom = 1;
        save();
        render();
      }

      function formatZoom(value = state.zoom) {
        return `${Math.round(value * 100)}%`;
      }

      function stageInfo(stage) {
        const img = stage?.querySelector("img");
        if (!stage || !img || !img.naturalWidth || !img.naturalHeight) return null;
        const rect = stage.getBoundingClientRect();
        const anchor = activeAnchorForImage(img);
        const anchorX = anchor[0];
        const anchorY = anchor[1];
        const effectiveZoom = effectiveZoomForImage(img);
        const left = rect.width / 2 + state.panX - anchorX * effectiveZoom;
        const top = rect.height / 2 + state.panY - anchorY * effectiveZoom;
        return { img, rect, anchorX, anchorY, effectiveZoom, left, top };
      }

      function zoomToFitForStage(stage) {
        const info = stageInfo(stage);
        if (!info) return 1;
        const scale = Number(info.img.dataset.scale) || 1;
        return Math.min(info.rect.width / (info.img.naturalWidth * scale), info.rect.height / (info.img.naturalHeight * scale));
      }

      function zoomToMaxVisibleForStage(stage) {
        const info = stageInfo(stage);
        if (!info) return 1;
        const scale = Number(info.img.dataset.scale) || 1;
        return Math.max(info.rect.width / (info.img.naturalWidth * scale), info.rect.height / (info.img.naturalHeight * scale));
      }

      function currentStage() {
        return document.querySelector("[data-stage]");
      }

      function setZoom(value) {
        state.zoom = Math.min(4, Math.max(0.05, Math.round(value * 100) / 100));
        zoomInput.value = String(state.zoom);
      }

      function activeAnchorForImage(img) {
        const xKey = state.anchorMode === "corner" ? "cornerX" : "anchorX";
        const yKey = state.anchorMode === "corner" ? "cornerY" : "anchorY";
        return [
          Number(img.dataset[xKey]) || img.naturalWidth / 2,
          Number(img.dataset[yKey]) || img.naturalHeight / 2
        ];
      }

      function effectiveZoomForImage(img) {
        return state.zoom * (Number(img.dataset.scale) || 1);
      }

      function normalizeImageScales() {
        const images = Array.from(document.querySelectorAll("[data-stage] img[data-camera]"));
        const base = images.find((img) => img.dataset.camera === scaleBaseCamera && img.naturalWidth);
        if (!base) return;
        images.forEach((img) => {
          if (!img.naturalWidth) return;
          const scale = base.naturalWidth / img.naturalWidth;
          img.dataset.scale = String(scale);
        });
      }

      function positionImage(img) {
        if (!img || !img.naturalWidth || !img.naturalHeight) return;
        const stage = img.closest("[data-stage]");
        if (!stage) return;
        const rect = stage.getBoundingClientRect();
        const [anchorX, anchorY] = activeAnchorForImage(img);
        const effectiveZoom = effectiveZoomForImage(img);
        const width = img.naturalWidth * effectiveZoom;
        const height = img.naturalHeight * effectiveZoom;
        img.style.width = `${width}px`;
        img.style.height = `${height}px`;
        img.style.left = `${rect.width / 2 + state.panX - anchorX * effectiveZoom}px`;
        img.style.top = `${rect.height / 2 + state.panY - anchorY * effectiveZoom}px`;
      }

      function positionImages() {
        normalizeImageScales();
        document.querySelectorAll("[data-stage] img").forEach(positionImage);
        updateOverlays();
        updateToolbarLabels();
      }

      function updateToolbarLabels() {
        maxViewButton.textContent = "最大显示 400%";
        fullscreenButton.textContent = isFullPageTool ? "缩小" : "全屏";
      }

      function articleUrl() {
        const fallback = new URL("../#studio-comparison", window.location.href).href;
        return params.get("return") || fallback;
      }

      function toolFullscreenUrl() {
        const url = new URL(window.location.href);
        url.searchParams.set("fullscreen", "1");
        try {
          const returnUrl = new URL(window.top.location.href);
          returnUrl.hash = "studio-comparison";
          url.searchParams.set("return", returnUrl.href);
        } catch (error) {
          url.searchParams.set("return", articleUrl());
        }
        return url.href;
      }

      function openFullPageTool() {
        window.top.location.href = toolFullscreenUrl();
      }

      function returnToArticle() {
        window.location.href = articleUrl();
      }

      function updateOverlays() {
        document.querySelectorAll("[data-stage]").forEach((stage) => {
          const info = stageInfo(stage);
          const viewport = stage.querySelector("[data-minimap-viewport]");
          const meta = stage.querySelector("[data-minimap-meta]");
          if (!info || !viewport || !meta) return;
          const minimapFrame = stage.querySelector("[data-minimap-frame]");
          const frameRect = minimapFrame.getBoundingClientRect();
          const imageAspect = info.img.naturalWidth / info.img.naturalHeight;
          const frameAspect = frameRect.width / frameRect.height;
          let mapW = frameRect.width;
          let mapH = frameRect.height;
          let mapX = 0;
          let mapY = 0;
          if (imageAspect > frameAspect) {
            mapH = mapW / imageAspect;
            mapY = (frameRect.height - mapH) / 2;
          } else {
            mapW = mapH * imageAspect;
            mapX = (frameRect.width - mapW) / 2;
          }
          const visibleX = Math.min(info.img.naturalWidth, Math.max(0, -info.left / info.effectiveZoom));
          const visibleY = Math.min(info.img.naturalHeight, Math.max(0, -info.top / info.effectiveZoom));
          const visibleW = Math.max(0, Math.min(info.img.naturalWidth - visibleX, info.rect.width / info.effectiveZoom));
          const visibleH = Math.max(0, Math.min(info.img.naturalHeight - visibleY, info.rect.height / info.effectiveZoom));
          const vpX = mapX + (visibleX / info.img.naturalWidth) * mapW;
          const vpY = mapY + (visibleY / info.img.naturalHeight) * mapH;
          const vpW = Math.max(6, (visibleW / info.img.naturalWidth) * mapW);
          const vpH = Math.max(6, (visibleH / info.img.naturalHeight) * mapH);
          viewport.style.left = `${Math.max(mapX, Math.min(mapX + mapW - vpW, vpX))}px`;
          viewport.style.top = `${Math.max(mapY, Math.min(mapY + mapH - vpH, vpY))}px`;
          viewport.style.width = `${Math.min(mapW, vpW)}px`;
          viewport.style.height = `${Math.min(mapH, vpH)}px`;
          meta.textContent = formatZoom();
        });
      }

      function renderGrid() {
        if (!state.cameras.length) {
          grid.innerHTML = '<div class="empty-state">没有找到可用对比配置</div>';
          return;
        }
        grid.innerHTML = state.cameras.map((camera) => {
          const src = activeSrc(camera);
          const label = state.format.toUpperCase();
          return `
            <article class="camera-card" data-card="${camera.id}">
              <div class="stage" data-stage>
                ${src ? `<img src="${src}" alt="${escapeHtml(camera.name)} ${label} crop" data-camera="${escapeHtml(camera.id)}" data-anchor-x="${camera.anchor ? camera.anchor[0] : ""}" data-anchor-y="${camera.anchor ? camera.anchor[1] : ""}" data-corner-x="${camera.corner ? camera.corner[0] : ""}" data-corner-y="${camera.corner ? camera.corner[1] : ""}" data-scale="${camera.scale}"><div class="loading-state"><div class="loading-pill"><span class="loading-spinner"></span></div></div>` : `<div class="empty-state">没有找到 ${escapeHtml(camera.name)} 的 ${label} 内置素材</div>`}
                <div class="image-label"><strong>${escapeHtml(camera.name)}</strong><span>${escapeHtml(camera.focal || "-")} · ISO ${escapeHtml(camera.iso)}</span></div>
                ${src ? `<div class="minimap"><div class="minimap-frame" data-minimap-frame><img src="${src}" alt=""><div class="minimap-viewport" data-minimap-viewport></div><div class="minimap-meta" data-minimap-meta>${formatZoom()}</div></div></div>` : ""}
              </div>
            </article>
          `;
        }).join("");
      }

      function render() {
        zoomInput.value = String(state.zoom);
        updateOptionButtons();
        renderGrid();
        requestAnimationFrame(positionImages);
      }

      function hydrate() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (saved) {
            state.presetGroup = saved.presetGroup || state.presetGroup;
            state.presetIso = saved.presetIso || state.presetIso;
            state.zoom = Number(saved.zoom || state.zoom);
            state.anchorMode = saved.anchorMode || state.anchorMode;
            state.panX = Number(saved.panX || 0);
            state.panY = Number(saved.panY || 0);
          }
          state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        } catch (error) {
          console.warn("Local restore failed", error);
          state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        }
      }

      function renderPresetOptions() {
        presetGroupSelect.innerHTML = presetGroups.map((group) => (
          `<button type="button" data-preset-group-option="${escapeHtml(group.id)}">${escapeHtml(group.label)}</button>`
        )).join("");
        presetIsoSelect.innerHTML = presetIsos.map((iso) => (
          `<button type="button" data-preset-iso-option="${escapeHtml(iso)}">${escapeHtml(iso.replace("ISO", "ISO "))}</button>`
        )).join("");
        updateOptionButtons();
      }

      function updateOptionButtons() {
        document.querySelectorAll("[data-preset-group-option]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.presetGroupOption === state.presetGroup);
        });
        document.querySelectorAll("[data-preset-iso-option]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.presetIsoOption === state.presetIso);
        });
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char]));
      }

      document.addEventListener("input", (event) => {
        const target = event.target;
        if (target.matches("[data-zoom]")) {
          setZoom(Number(target.value));
          positionImages();
          save();
        }
      });

      document.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.matches("[data-preset-group-option]")) {
          state.presetGroup = target.dataset.presetGroupOption;
          applyPreset();
        }
        if (target.matches("[data-preset-iso-option]")) {
          state.presetIso = target.dataset.presetIsoOption;
          applyPreset();
        }
        if (target.matches("[data-fit]")) {
          state.anchorMode = "ifc";
          setZoom(zoomToFitForStage(currentStage()));
          state.panX = 0;
          state.panY = 0;
          save();
          positionImages();
        }
        if (target.matches("[data-max-view]")) {
          setZoom(4);
          state.panX = 0;
          state.panY = 0;
          save();
          positionImages();
        }
        if (target.matches("[data-actual]")) {
          setZoom(1);
          save();
          positionImages();
        }
        if (target.matches("[data-center]")) {
          state.anchorMode = "ifc";
          state.panX = 0;
          state.panY = 0;
          save();
          positionImages();
        }
        if (target.matches("[data-corner]")) {
          state.anchorMode = "corner";
          state.panX = 0;
          state.panY = 0;
          save();
          positionImages();
        }
        if (target.matches("[data-fullscreen]")) {
          if (isFullPageTool) {
            returnToArticle();
          } else {
            openFullPageTool();
          }
        }
      });

      let drag = null;
      document.addEventListener("pointerdown", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        drag = { x: event.clientX, y: event.clientY, panX: state.panX, panY: state.panY };
        stage.setPointerCapture(event.pointerId);
      });

      document.addEventListener("pointermove", (event) => {
        if (!drag) return;
        state.panX = drag.panX + event.clientX - drag.x;
        state.panY = drag.panY + event.clientY - drag.y;
        positionImages();
      });

      document.addEventListener("pointerup", () => {
        if (!drag) return;
        drag = null;
        save();
      });

      document.addEventListener("wheel", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        event.preventDefault();
        const next = Math.min(4, Math.max(0.05, state.zoom + (event.deltaY > 0 ? -0.08 : 0.08)));
        setZoom(next);
        positionImages();
        save();
      }, { passive: false });

      document.addEventListener("load", (event) => {
        if (event.target.matches("[data-stage] img[data-camera]")) {
          event.target.closest("[data-stage]")?.classList.add("is-loaded");
          positionImages();
        }
      }, true);
      document.addEventListener("error", (event) => {
        if (event.target.matches("[data-stage] img[data-camera]")) {
          const stage = event.target.closest("[data-stage]");
          if (stage) {
            stage.classList.add("is-loaded");
            stage.insertAdjacentHTML("beforeend", '<div class="empty-state">图片加载失败</div>');
          }
        }
      }, true);
      window.addEventListener("resize", positionImages);
      async function init() {
        try {
          await loadToolConfig();
          renderPresetOptions();
          hydrate();
          render();
        } catch (error) {
          console.error(error);
          grid.innerHTML = `<div class="empty-state">对比工具配置加载失败：${escapeHtml(error.message)}</div>`;
        }
      }

      init();
    })();
  </script>
</body>
</html>
