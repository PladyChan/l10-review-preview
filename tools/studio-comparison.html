<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>L10 Studio Image Comparison</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #090909;
      --panel: #141414;
      --panel-2: #202020;
      --ink: #f2f2f2;
      --body: #cfcfcf;
      --muted: #8b8b8b;
      --line: #343434;
      --accent: #e3322b;
      --focus: #f6d55c;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f3f1ea;
      --panel: #fffdf6;
      --panel-2: #ebe7dc;
      --ink: #111;
      --body: #34312d;
      --muted: #6d675f;
      --line: #cbc4b5;
      --accent: #c91f1a;
      --focus: #8a6500;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--panel-2);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px clamp(14px, 2.8vw, 28px);
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 2.6vw, 34px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subline {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions,
    .toolbar,
    .segmented,
    .camera-controls,
    .view-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .top-actions button,
    .toolbar button {
      padding: 6px 11px;
    }

    .toolbar {
      padding: 12px clamp(14px, 2.8vw, 28px);
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .toolbar label,
    .camera-controls label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.2;
    }

    .toolbar input[type="range"] {
      width: min(34vw, 240px);
      accent-color: var(--accent);
    }

    select {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--bg);
      color: var(--ink);
      padding: 5px 8px;
    }

    .segmented {
      gap: 0;
      border: 1px solid var(--line);
    }

    .segmented button {
      min-width: 64px;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
    }

    .segmented button:last-child {
      border-right: 0;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 340px);
      gap: 0;
      min-height: 0;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 12px;
      min-height: 0;
    }

    .camera-card {
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      grid-template-rows: auto minmax(220px, 1fr) auto;
    }

    .camera-head {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
    }

    .camera-name {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--panel-2);
      color: var(--ink);
      padding: 6px 9px;
    }

    .camera-controls {
      justify-content: space-between;
    }

    .camera-controls input {
      width: 92px;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--bg);
      color: var(--ink);
      padding: 5px 7px;
    }

    .stage {
      position: relative;
      min-height: 220px;
      overflow: hidden;
      background:
        linear-gradient(45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(-45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%),
        linear-gradient(-45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      touch-action: none;
      cursor: grab;
    }

    .stage:active { cursor: grabbing; }

    .stage img {
      position: absolute;
      left: 50%;
      top: 50%;
      max-width: none;
      width: auto;
      height: auto;
      transform: translate(calc(-50% + var(--pan-x, 0px)), calc(-50% + var(--pan-y, 0px))) scale(var(--zoom, 1));
      transform-origin: center;
      user-select: none;
      pointer-events: none;
      image-rendering: auto;
    }

    .stage.is-pixelated img {
      image-rendering: pixelated;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      z-index: 4;
      pointer-events: none;
      background: color-mix(in srgb, var(--focus) 74%, transparent);
    }

    .reticle::before {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
    }

    .reticle::after {
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
    }

    .camera-foot {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 9px 10px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
    }

    .camera-foot strong {
      color: var(--ink);
      font-weight: 700;
    }

    .side {
      border-left: 1px solid var(--line);
      background: var(--panel);
      min-height: 0;
      overflow: auto;
    }

    .side-section {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .side-section h2 {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.2;
    }

    .preset-fields {
      display: grid;
      gap: 9px;
    }

    .preset-fields label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.2;
    }

    .preset-fields button {
      width: 100%;
      padding: 7px 10px;
    }

    .help {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
    }

    .notes {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--bg);
      color: var(--body);
      padding: 9px;
      font: 13px/1.55 var(--font);
    }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      header {
        position: relative;
        grid-template-columns: 1fr;
      }

      .main {
        display: block;
      }

      .side {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 720px) {
      .compare-grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
      }

      .toolbar input[type="range"] {
        width: 100%;
      }

      .top-actions {
        justify-content: stretch;
      }

      .top-actions button,
      .toolbar button,
      .segmented {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Studio Scene Image Comparison</h1>
        <div class="subline">固定读取 RAW 导出 JPG 对比组，支持同步缩放和拖拽取景。</div>
      </div>
      <div class="top-actions">
        <button type="button" data-theme>深浅色</button>
      </div>
    </header>

    <div class="toolbar" aria-label="对比控制">
      <div class="segmented" role="group" aria-label="文件格式">
        <button type="button" class="is-active" data-format="raw">RAW</button>
        <button type="button" data-format="jpg">JPG</button>
      </div>
      <label>缩放
        <input type="range" min="0.35" max="4" step="0.05" value="1" data-zoom>
      </label>
      <div class="view-controls">
        <button type="button" data-fit>适合窗口</button>
        <button type="button" data-actual>100%</button>
        <button type="button" data-center>回到中心</button>
        <button type="button" data-reticle class="is-active">十字线</button>
        <button type="button" data-pixel>像素预览</button>
      </div>
    </div>

    <div class="main">
      <section class="compare-grid" data-grid></section>
      <aside class="side" aria-label="内置对比组和备注">
        <div class="side-section">
          <h2>内置对比组</h2>
          <div class="preset-fields">
            <label>对比组
              <select data-preset-group></select>
            </label>
            <label>ISO
              <select data-preset-iso></select>
            </label>
            <button type="button" data-load-preset>加载这组</button>
          </div>
          <p class="help" data-preset-summary></p>
        </div>
        <div class="side-section">
          <h2>观察记录</h2>
          <textarea class="notes" data-notes placeholder="比如：同一位置看黑白线条边缘、颜色摩尔纹、RAW 粒状感、JPG 涂抹、不同 ISO 的细节损失。"></textarea>
        </div>
      </aside>
    </div>
  </div>

  <script>
    (() => {
      const presetGroups = [
        {
          id: "L10_28mm_vs_GR4_28mm",
          label: "L10 28mm vs GR4 28mm",
          summary: "L10 28mm RAW 导出 JPG 对 GR4 28mm RAW 导出 JPG。",
          cameras: [
            { id: "l10", name: "Panasonic Lumix DC-L10", focal: "28mm", prefix: "01_L10_28mm" },
            { id: "gr4", name: "Ricoh GR IV", focal: "28mm", prefix: "02_GR4_28mm" }
          ]
        },
        {
          id: "L10_35mm_vs_S9_35mm",
          label: "L10 35mm vs S9 35mm",
          summary: "L10 35mm RAW 导出 JPG 对 S9 35mm RAW 导出 JPG。",
          cameras: [
            { id: "l10", name: "Panasonic Lumix DC-L10", focal: "35mm", prefix: "01_L10_35mm" },
            { id: "s9", name: "Panasonic Lumix DC-S9", focal: "35mm", prefix: "02_S9_35mm" }
          ]
        },
        {
          id: "L10_35mm_vs_X100VI_35mm",
          label: "L10 35mm vs X100VI 35mm",
          summary: "L10 35mm RAW 导出 JPG 对 X100VI 35mm RAW 导出 JPG。",
          cameras: [
            { id: "l10", name: "Panasonic Lumix DC-L10", focal: "35mm", prefix: "01_L10_35mm" },
            { id: "x100vi", name: "Fujifilm X100VI", focal: "35mm", prefix: "02_X100VI_35mm" }
          ]
        }
      ];
      const presetIsos = ["ISO1600", "ISO3200", "ISO6400", "ISO12800"];
      const assetBase = "studio-assets/raw";
      const storageKey = "l10-studio-comparison-view-v2";
      const state = {
        format: "raw",
        presetGroup: "L10_28mm_vs_GR4_28mm",
        presetIso: "ISO1600",
        zoom: 1,
        panX: 0,
        panY: 0,
        reticle: true,
        pixelated: false,
        notes: "",
        cameras: []
      };

      const grid = document.querySelector("[data-grid]");
      const zoomInput = document.querySelector("[data-zoom]");
      const notes = document.querySelector("[data-notes]");
      const presetGroupSelect = document.querySelector("[data-preset-group]");
      const presetIsoSelect = document.querySelector("[data-preset-iso]");
      const presetSummary = document.querySelector("[data-preset-summary]");

      const save = () => {
        try {
          localStorage.setItem(storageKey, JSON.stringify(state));
        } catch (error) {
          console.warn("Local save failed", error);
        }
      };

      const formatSource = (camera) => {
        if (!activeSrc(camera)) return "无素材";
        return "内置 RAW 导出 JPG";
      };

      const activeSrc = (camera) => camera[state.format] || "";

      function groupFor(id) {
        return presetGroups.find((group) => group.id === id) || presetGroups[0];
      }

      function assetPath(groupId, iso, camera) {
        return `${assetBase}/${groupId}/${iso}/${camera.prefix}_${iso}.jpg`;
      }

      function buildPresetCameras(groupId, iso) {
        const group = groupFor(groupId);
        return group.cameras.map((camera) => ({
          id: camera.id,
          name: camera.name,
          iso: iso.replace("ISO", ""),
          focal: camera.focal,
          jpg: "",
          raw: assetPath(group.id, iso, camera)
        }));
      }

      function applyPreset() {
        state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        state.format = "raw";
        state.panX = 0;
        state.panY = 0;
        state.zoom = 1;
        save();
        render();
      }

      function renderGrid() {
        grid.innerHTML = state.cameras.map((camera) => {
          const src = activeSrc(camera);
          const label = state.format.toUpperCase();
          return `
            <article class="camera-card" data-card="${camera.id}">
              <div class="camera-head">
                <input class="camera-name" value="${escapeHtml(camera.name)}" readonly aria-label="机型名称">
                <div class="camera-controls">
                  <label>格式<input value="${label}" readonly></label>
                  <label>焦段<input value="${escapeHtml(camera.focal || "-")}" readonly></label>
                  <label>ISO<input value="${escapeHtml(camera.iso)}" readonly aria-label="${escapeHtml(camera.name)} ISO"></label>
                </div>
              </div>
              <div class="stage ${state.reticle ? "reticle" : ""} ${state.pixelated ? "is-pixelated" : ""}" data-stage style="--zoom:${state.zoom}; --pan-x:${state.panX}px; --pan-y:${state.panY}px;">
                ${src ? `<img src="${src}" alt="${escapeHtml(camera.name)} ${label} crop">` : `<div class="empty-state">没有找到 ${escapeHtml(camera.name)} 的 ${label} 内置素材</div>`}
              </div>
              <div class="camera-foot">
                <span><strong>${label}</strong> ${formatSource(camera)}</span>
                <span>${escapeHtml(camera.focal || "-")} · ISO ${escapeHtml(camera.iso)}</span>
              </div>
            </article>
          `;
        }).join("");
      }

      function render() {
        zoomInput.value = String(state.zoom);
        notes.value = state.notes;
        presetGroupSelect.value = state.presetGroup;
        presetIsoSelect.value = state.presetIso;
        presetSummary.textContent = groupFor(state.presetGroup).summary;
        document.querySelectorAll("[data-format]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.format === state.format);
        });
        document.querySelector("[data-reticle]").classList.toggle("is-active", state.reticle);
        document.querySelector("[data-pixel]").classList.toggle("is-active", state.pixelated);
        renderGrid();
      }

      function hydrate() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (saved) {
            state.presetGroup = saved.presetGroup || state.presetGroup;
            state.presetIso = saved.presetIso || state.presetIso;
            state.zoom = Number(saved.zoom || state.zoom);
            state.panX = Number(saved.panX || 0);
            state.panY = Number(saved.panY || 0);
            state.reticle = saved.reticle !== undefined ? Boolean(saved.reticle) : state.reticle;
            state.pixelated = Boolean(saved.pixelated);
            state.notes = saved.notes || "";
          }
          state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        } catch (error) {
          console.warn("Local restore failed", error);
          state.cameras = buildPresetCameras(state.presetGroup, state.presetIso);
        }
      }

      function renderPresetOptions() {
        presetGroupSelect.innerHTML = presetGroups.map((group) => (
          `<option value="${escapeHtml(group.id)}">${escapeHtml(group.label)}</option>`
        )).join("");
        presetIsoSelect.innerHTML = presetIsos.map((iso) => (
          `<option value="${escapeHtml(iso)}">${escapeHtml(iso.replace("ISO", "ISO "))}</option>`
        )).join("");
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char]));
      }

      function cameraById(id) {
        return state.cameras.find((camera) => camera.id === id);
      }

      document.addEventListener("input", (event) => {
        const target = event.target;
        if (target.matches("[data-zoom]")) {
          state.zoom = Number(target.value);
          document.querySelectorAll("[data-stage]").forEach((stage) => {
            stage.style.setProperty("--zoom", state.zoom);
          });
          save();
        }
        if (target.matches("[data-notes]")) {
          state.notes = target.value;
          save();
        }
      });

      document.addEventListener("change", (event) => {
        const target = event.target;
        if (target.matches("[data-preset-group]")) {
          state.presetGroup = target.value;
          applyPreset();
        }
        if (target.matches("[data-preset-iso]")) {
          state.presetIso = target.value;
          applyPreset();
        }
      });

      document.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.matches("[data-format]")) {
          state.format = target.dataset.format;
          save();
          render();
        }
        if (target.matches("[data-fit]")) {
          state.zoom = 0.7;
          state.panX = 0;
          state.panY = 0;
          save();
          render();
        }
        if (target.matches("[data-actual]")) {
          state.zoom = 1;
          save();
          render();
        }
        if (target.matches("[data-center]")) {
          state.panX = 0;
          state.panY = 0;
          save();
          render();
        }
        if (target.matches("[data-reticle]")) {
          state.reticle = !state.reticle;
          save();
          render();
        }
        if (target.matches("[data-pixel]")) {
          state.pixelated = !state.pixelated;
          save();
          render();
        }
        if (target.matches("[data-theme]")) {
          const root = document.documentElement;
          root.dataset.theme = root.dataset.theme === "light" ? "dark" : "light";
        }
        if (target.matches("[data-load-preset]")) {
          applyPreset();
        }
      });

      let drag = null;
      document.addEventListener("pointerdown", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        drag = { x: event.clientX, y: event.clientY, panX: state.panX, panY: state.panY };
        stage.setPointerCapture(event.pointerId);
      });

      document.addEventListener("pointermove", (event) => {
        if (!drag) return;
        state.panX = drag.panX + event.clientX - drag.x;
        state.panY = drag.panY + event.clientY - drag.y;
        document.querySelectorAll("[data-stage]").forEach((stage) => {
          stage.style.setProperty("--pan-x", `${state.panX}px`);
          stage.style.setProperty("--pan-y", `${state.panY}px`);
        });
      });

      document.addEventListener("pointerup", () => {
        if (!drag) return;
        drag = null;
        save();
      });

      document.addEventListener("wheel", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        event.preventDefault();
        const next = Math.min(4, Math.max(0.35, state.zoom + (event.deltaY > 0 ? -0.08 : 0.08)));
        state.zoom = Math.round(next * 100) / 100;
        zoomInput.value = String(state.zoom);
        document.querySelectorAll("[data-stage]").forEach((item) => item.style.setProperty("--zoom", state.zoom));
        save();
      }, { passive: false });

      renderPresetOptions();
      hydrate();
      render();
    })();
  </script>
</body>
</html>
