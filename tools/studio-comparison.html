<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>L10 Studio Image Comparison</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #090909;
      --panel: #141414;
      --panel-2: #202020;
      --ink: #f2f2f2;
      --body: #cfcfcf;
      --muted: #8b8b8b;
      --line: #343434;
      --accent: #e3322b;
      --focus: #f6d55c;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f3f1ea;
      --panel: #fffdf6;
      --panel-2: #ebe7dc;
      --ink: #111;
      --body: #34312d;
      --muted: #6d675f;
      --line: #cbc4b5;
      --accent: #c91f1a;
      --focus: #8a6500;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button,
    .file-button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--panel-2);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover,
    .file-button:hover {
      border-color: var(--accent);
    }

    button.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px clamp(14px, 2.8vw, 28px);
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 2.6vw, 34px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subline {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions,
    .toolbar,
    .segmented,
    .camera-controls,
    .view-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .top-actions button,
    .toolbar button,
    .file-button {
      padding: 6px 11px;
    }

    .toolbar {
      padding: 12px clamp(14px, 2.8vw, 28px);
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .toolbar label,
    .camera-controls label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.2;
    }

    .toolbar input[type="range"] {
      width: min(34vw, 240px);
      accent-color: var(--accent);
    }

    .segmented {
      gap: 0;
      border: 1px solid var(--line);
    }

    .segmented button {
      min-width: 64px;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
    }

    .segmented button:last-child {
      border-right: 0;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 340px);
      gap: 0;
      min-height: 0;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 12px;
      min-height: 0;
    }

    .camera-card {
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      grid-template-rows: auto minmax(220px, 1fr) auto;
    }

    .camera-head {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
    }

    .camera-name {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--panel-2);
      color: var(--ink);
      padding: 6px 9px;
    }

    .camera-controls {
      justify-content: space-between;
    }

    .camera-controls input {
      width: 92px;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--bg);
      color: var(--ink);
      padding: 5px 7px;
    }

    .stage {
      position: relative;
      min-height: 220px;
      overflow: hidden;
      background:
        linear-gradient(45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(-45deg, color-mix(in srgb, var(--panel-2) 82%, #000) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%),
        linear-gradient(-45deg, transparent 75%, color-mix(in srgb, var(--panel-2) 82%, #000) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      touch-action: none;
      cursor: grab;
    }

    .stage:active { cursor: grabbing; }

    .stage img {
      position: absolute;
      left: 50%;
      top: 50%;
      max-width: none;
      width: auto;
      height: auto;
      transform: translate(calc(-50% + var(--pan-x, 0px)), calc(-50% + var(--pan-y, 0px))) scale(var(--zoom, 1));
      transform-origin: center;
      user-select: none;
      pointer-events: none;
      image-rendering: auto;
    }

    .stage.is-pixelated img {
      image-rendering: pixelated;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      z-index: 4;
      pointer-events: none;
      background: color-mix(in srgb, var(--focus) 74%, transparent);
    }

    .reticle::before {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
    }

    .reticle::after {
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
    }

    .camera-foot {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 9px 10px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
    }

    .camera-foot strong {
      color: var(--ink);
      font-weight: 700;
    }

    .side {
      border-left: 1px solid var(--line);
      background: var(--panel);
      min-height: 0;
      overflow: auto;
    }

    .side-section {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .side-section h2 {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.2;
    }

    .drop-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .file-button {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 42px;
      color: var(--body);
      text-align: center;
      overflow: hidden;
    }

    .file-button input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .help {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
    }

    .slot-list {
      display: grid;
      gap: 10px;
    }

    .slot {
      display: grid;
      gap: 7px;
      padding: 10px;
      border: 1px solid var(--line);
      background: var(--bg);
    }

    .slot-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .slot-title strong {
      overflow-wrap: anywhere;
    }

    .slot-title span {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      white-space: nowrap;
    }

    .notes {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--bg);
      color: var(--body);
      padding: 9px;
      font: 13px/1.55 var(--font);
    }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      header {
        position: relative;
        grid-template-columns: 1fr;
      }

      .main {
        display: block;
      }

      .side {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 720px) {
      .compare-grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
      }

      .toolbar input[type="range"] {
        width: 100%;
      }

      .top-actions {
        justify-content: stretch;
      }

      .top-actions button,
      .toolbar button,
      .segmented,
      .file-button {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Studio Scene Image Comparison</h1>
        <div class="subline">四机位 JPG / RAW 局部对比，支持同步缩放、拖拽取景和本地保存。</div>
      </div>
      <div class="top-actions">
        <button type="button" data-theme>深浅色</button>
        <button type="button" data-export>导出配置</button>
        <label class="file-button">导入配置<input type="file" accept="application/json" data-import></label>
      </div>
    </header>

    <div class="toolbar" aria-label="对比控制">
      <div class="segmented" role="group" aria-label="文件格式">
        <button type="button" class="is-active" data-format="raw">RAW</button>
        <button type="button" data-format="jpg">JPG</button>
      </div>
      <label>缩放
        <input type="range" min="0.35" max="4" step="0.05" value="1" data-zoom>
      </label>
      <div class="view-controls">
        <button type="button" data-fit>适合窗口</button>
        <button type="button" data-actual>100%</button>
        <button type="button" data-center>回到中心</button>
        <button type="button" data-reticle class="is-active">十字线</button>
        <button type="button" data-pixel>像素预览</button>
      </div>
    </div>

    <div class="main">
      <section class="compare-grid" data-grid></section>
      <aside class="side" aria-label="图片导入和备注">
        <div class="side-section">
          <h2>图片槽位</h2>
          <p class="help">每台机器可以放一张 JPG 和一张 RAW 导出的对比图。RAW 建议先用统一流程转成可浏览的 JPEG / PNG / WebP。</p>
        </div>
        <div class="side-section slot-list" data-slots></div>
        <div class="side-section">
          <h2>观察记录</h2>
          <textarea class="notes" data-notes placeholder="比如：同一位置看黑白线条边缘、颜色摩尔纹、RAW 粒状感、JPG 涂抹、不同 ISO 的细节损失。"></textarea>
        </div>
      </aside>
    </div>
  </div>

  <script>
    (() => {
      const defaultCameras = [
        { id: "x100vi", name: "Fujifilm X100VI", iso: "125", jpg: "", raw: "" },
        { id: "l10", name: "Panasonic Lumix DC-L10", iso: "100", jpg: "", raw: "" },
        { id: "s9", name: "Panasonic Lumix DC-S9", iso: "100", jpg: "", raw: "" },
        { id: "gr4", name: "Ricoh GR IV", iso: "100", jpg: "", raw: "" }
      ];

      const storageKey = "l10-studio-comparison-v1";
      const state = {
        format: "raw",
        zoom: 1,
        panX: 0,
        panY: 0,
        reticle: true,
        pixelated: false,
        notes: "",
        cameras: structuredClone(defaultCameras)
      };

      const grid = document.querySelector("[data-grid]");
      const slots = document.querySelector("[data-slots]");
      const zoomInput = document.querySelector("[data-zoom]");
      const notes = document.querySelector("[data-notes]");

      const save = () => {
        try {
          localStorage.setItem(storageKey, JSON.stringify(state));
        } catch (error) {
          console.warn("Local save failed", error);
        }
      };

      const readFileAsDataUrl = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.addEventListener("load", () => resolve(reader.result));
        reader.addEventListener("error", () => reject(reader.error));
        reader.readAsDataURL(file);
      });

      const formatSize = (dataUrl) => {
        if (!dataUrl) return "未导入";
        const size = Math.round((dataUrl.length * 3 / 4) / 1024 / 1024 * 10) / 10;
        return `${size}MB`;
      };

      const activeSrc = (camera) => camera[state.format] || "";

      function renderGrid() {
        grid.innerHTML = state.cameras.map((camera) => {
          const src = activeSrc(camera);
          const label = state.format.toUpperCase();
          return `
            <article class="camera-card" data-card="${camera.id}">
              <div class="camera-head">
                <input class="camera-name" value="${escapeHtml(camera.name)}" data-name="${camera.id}" aria-label="机型名称">
                <div class="camera-controls">
                  <label>格式<input value="${label}" readonly></label>
                  <label>ISO<input value="${escapeHtml(camera.iso)}" data-iso="${camera.id}" aria-label="${escapeHtml(camera.name)} ISO"></label>
                </div>
              </div>
              <div class="stage ${state.reticle ? "reticle" : ""} ${state.pixelated ? "is-pixelated" : ""}" data-stage style="--zoom:${state.zoom}; --pan-x:${state.panX}px; --pan-y:${state.panY}px;">
                ${src ? `<img src="${src}" alt="${escapeHtml(camera.name)} ${label} crop">` : `<div class="empty-state">导入 ${escapeHtml(camera.name)} 的 ${label} 图片</div>`}
              </div>
              <div class="camera-foot">
                <span><strong>${label}</strong> ${formatSize(src)}</span>
                <span>ISO ${escapeHtml(camera.iso)}</span>
              </div>
            </article>
          `;
        }).join("");
      }

      function renderSlots() {
        slots.innerHTML = state.cameras.map((camera) => `
          <div class="slot">
            <div class="slot-title">
              <strong>${escapeHtml(camera.name)}</strong>
              <span>ISO ${escapeHtml(camera.iso)}</span>
            </div>
            <div class="drop-row">
              <label class="file-button">JPG ${formatSize(camera.jpg)}<input type="file" accept="image/*" data-file="${camera.id}" data-kind="jpg"></label>
              <label class="file-button">RAW ${formatSize(camera.raw)}<input type="file" accept="image/*" data-file="${camera.id}" data-kind="raw"></label>
            </div>
          </div>
        `).join("");
      }

      function render() {
        zoomInput.value = String(state.zoom);
        notes.value = state.notes;
        document.querySelectorAll("[data-format]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.format === state.format);
        });
        document.querySelector("[data-reticle]").classList.toggle("is-active", state.reticle);
        document.querySelector("[data-pixel]").classList.toggle("is-active", state.pixelated);
        renderGrid();
        renderSlots();
      }

      function hydrate() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (!saved) return;
          Object.assign(state, saved);
          state.cameras = defaultCameras.map((camera, index) => ({
            ...camera,
            ...(saved.cameras && saved.cameras[index] ? saved.cameras[index] : {})
          }));
        } catch (error) {
          console.warn("Local restore failed", error);
        }
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char]));
      }

      function cameraById(id) {
        return state.cameras.find((camera) => camera.id === id);
      }

      document.addEventListener("input", (event) => {
        const target = event.target;
        if (target.matches("[data-zoom]")) {
          state.zoom = Number(target.value);
          document.querySelectorAll("[data-stage]").forEach((stage) => {
            stage.style.setProperty("--zoom", state.zoom);
          });
          save();
        }
        if (target.matches("[data-name]")) {
          const camera = cameraById(target.dataset.name);
          if (camera) camera.name = target.value;
          save();
          renderSlots();
        }
        if (target.matches("[data-iso]")) {
          const camera = cameraById(target.dataset.iso);
          if (camera) camera.iso = target.value;
          save();
          renderSlots();
          renderGrid();
        }
        if (target.matches("[data-notes]")) {
          state.notes = target.value;
          save();
        }
      });

      document.addEventListener("change", async (event) => {
        const target = event.target;
        if (target.matches("[data-file]") && target.files && target.files[0]) {
          const camera = cameraById(target.dataset.file);
          if (!camera) return;
          camera[target.dataset.kind] = await readFileAsDataUrl(target.files[0]);
          save();
          render();
        }
        if (target.matches("[data-import]") && target.files && target.files[0]) {
          const text = await target.files[0].text();
          const imported = JSON.parse(text);
          Object.assign(state, imported);
          save();
          render();
        }
      });

      document.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.matches("[data-format]")) {
          state.format = target.dataset.format;
          save();
          render();
        }
        if (target.matches("[data-fit]")) {
          state.zoom = 0.7;
          state.panX = 0;
          state.panY = 0;
          save();
          render();
        }
        if (target.matches("[data-actual]")) {
          state.zoom = 1;
          save();
          render();
        }
        if (target.matches("[data-center]")) {
          state.panX = 0;
          state.panY = 0;
          save();
          render();
        }
        if (target.matches("[data-reticle]")) {
          state.reticle = !state.reticle;
          save();
          render();
        }
        if (target.matches("[data-pixel]")) {
          state.pixelated = !state.pixelated;
          save();
          render();
        }
        if (target.matches("[data-theme]")) {
          const root = document.documentElement;
          root.dataset.theme = root.dataset.theme === "light" ? "dark" : "light";
        }
        if (target.matches("[data-export]")) {
          const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = "l10-studio-comparison.json";
          link.click();
          URL.revokeObjectURL(url);
        }
      });

      let drag = null;
      document.addEventListener("pointerdown", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        drag = { x: event.clientX, y: event.clientY, panX: state.panX, panY: state.panY };
        stage.setPointerCapture(event.pointerId);
      });

      document.addEventListener("pointermove", (event) => {
        if (!drag) return;
        state.panX = drag.panX + event.clientX - drag.x;
        state.panY = drag.panY + event.clientY - drag.y;
        document.querySelectorAll("[data-stage]").forEach((stage) => {
          stage.style.setProperty("--pan-x", `${state.panX}px`);
          stage.style.setProperty("--pan-y", `${state.panY}px`);
        });
      });

      document.addEventListener("pointerup", () => {
        if (!drag) return;
        drag = null;
        save();
      });

      document.addEventListener("wheel", (event) => {
        const stage = event.target.closest("[data-stage]");
        if (!stage) return;
        event.preventDefault();
        const next = Math.min(4, Math.max(0.35, state.zoom + (event.deltaY > 0 ? -0.08 : 0.08)));
        state.zoom = Math.round(next * 100) / 100;
        zoomInput.value = String(state.zoom);
        document.querySelectorAll("[data-stage]").forEach((item) => item.style.setProperty("--zoom", state.zoom));
        save();
      }, { passive: false });

      hydrate();
      render();
    })();
  </script>
</body>
</html>
